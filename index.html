<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Weaver - Phase 1</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: monospace; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Echo Weaver: Phase 1<br/>Hand Tracking Sandbox. Requires WebXR capable headset.</div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        // --- System Globals ---
        let camera, scene, renderer;
        let heartStone;
        let orbs = [];
        const hands = [null, null]; // Left, Right
        
        // Settings based on GDD
        const EMA_ALPHA = 0.4; // 0.0 to 1.0. Lower is smoother but laggier.
        const CATCH_RADIUS = 0.15; // Meters

        // Track smoothed positions to prevent jitter
        const smoothedJoints = new Map();

        init();
        renderer.setAnimationLoop(animate);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a12);
            scene.fog = new THREE.Fog(0x0a0a12, 2, 10);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 3); // Average standing height

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // --- Environment Setup ---
            const grid = new THREE.GridHelper(20, 40, 0x222244, 0x111122);
            scene.add(grid);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00ffff, 2, 10);
            pointLight.position.set(0, 1.2, 0);
            scene.add(pointLight);

            // --- Heart Stone ---
            const stoneGeo = new THREE.IcosahedronGeometry(0.3, 1);
            const stoneMat = new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x008888,
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });
            heartStone = new THREE.Mesh(stoneGeo, stoneMat);
            heartStone.position.set(0, 1.2, -0.5);
            scene.add(heartStone);

            // --- Test Orbs ---
            createOrb(new THREE.Vector3(-0.5, 1.2, -0.2), 0xff0055); // Left Orb
            createOrb(new THREE.Vector3(0.5, 1.2, -0.2), 0xaa00ff);  // Right Orb

            // --- WebXR Hands Setup ---
            setupHand(0); // Left
            setupHand(1); // Right

            window.addEventListener('resize', onWindowResize);
        }

        function createOrb(position, colorHex) {
            const geo = new THREE.SphereGeometry(0.08, 16, 16);
            const mat = new THREE.MeshStandardMaterial({
                color: colorHex,
                emissive: colorHex,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.8
            });
            const orb = new THREE.Mesh(geo, mat);
            orb.position.copy(position);
            
            // Custom properties for game logic
            orb.userData = {
                baseY: position.y,
                phase: Math.random() * Math.PI * 2,
                heldBy: null // null or 'left'/'right'
            };
            
            scene.add(orb);
            orbs.push(orb);
        }

        function setupHand(index) {
            const hand = renderer.xr.getHand(index);
            scene.add(hand);

            // Custom joint rendering (Ghost Hands)
            const jointGeo = new THREE.SphereGeometry(0.015, 8, 8);
            const jointMat = new THREE.MeshBasicMaterial({
                color: 0x00ffcc,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });

            // Standard WebXR joint names we care about
            const keyJoints = [
                'wrist', 'thumb-tip', 'index-finger-tip', 'middle-finger-tip', 'ring-finger-tip', 'pinky-finger-tip'
            ];

            hand.userData.jointMeshes = {};
            hand.userData.isHolding = false;
            hand.userData.handedness = index === 0 ? 'left' : 'right';

            // We will dynamically create meshes for joints as they appear in the XR tracking data
            hand.addEventListener('connected', (event) => {
                hand.userData.xrInputSource = event.data;
            });

            hands[index] = hand;
        }

        function applyEMA(jointName, currentPos, frameTime) {
            // Apply Exponential Moving Average filter
            if (!smoothedJoints.has(jointName)) {
                smoothedJoints.set(jointName, currentPos.clone());
                return currentPos.clone();
            }

            const previousPos = smoothedJoints.get(jointName);
            const smoothed = new THREE.Vector3();
            
            // Formula from GDD: smoothed_pos = (raw_pos * alpha) + (smoothed_pos * (1 - alpha))
            smoothed.x = (currentPos.x * EMA_ALPHA) + (previousPos.x * (1 - EMA_ALPHA));
            smoothed.y = (currentPos.y * EMA_ALPHA) + (previousPos.y * (1 - EMA_ALPHA));
            smoothed.z = (currentPos.z * EMA_ALPHA) + (previousPos.z * (1 - EMA_ALPHA));

            smoothedJoints.set(jointName, smoothed);
            return smoothed;
        }

        function isHandOpen(hand) {
            // GDD approximation: Distance from wrist to index tip.
            // If clenched, distance is small. If open, distance is large (~0.15m for adult).
            if (!hand.joints || !hand.joints['wrist'] || !hand.joints['index-finger-tip']) return false;

            const wrist = hand.joints['wrist'];
            const indexTip = hand.joints['index-finger-tip'];
            
            if (!wrist.position || !indexTip.position) return false;

            const dist = wrist.position.distanceTo(indexTip.position);
            return dist > 0.10; // 10cm threshold for "open"
        }

        function updateHands() {
            hands.forEach(hand => {
                if (!hand || !hand.joints) return;

                const wristSpace = hand.joints['wrist'];
                if (!wristSpace || !wristSpace.position) return; // Tracking lost

                // Render visual ghost joints
                Object.keys(hand.joints).forEach(jointName => {
                    const joint = hand.joints[jointName];
                    if (!joint.position) return;

                    // Create mesh if it doesn't exist
                    if (!hand.userData.jointMeshes[jointName]) {
                        const geo = new THREE.SphereGeometry(jointName.includes('tip') ? 0.012 : 0.008, 8, 8);
                        const mat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.3 });
                        const mesh = new THREE.Mesh(geo, mat);
                        scene.add(mesh);
                        hand.userData.jointMeshes[jointName] = mesh;
                    }

                    const mesh = hand.userData.jointMeshes[jointName];
                    
                    // Apply EMA smoothing to visual representation
                    const uniqueJointId = `${hand.userData.handedness}_${jointName}`;
                    const smoothedPos = applyEMA(uniqueJointId, joint.position);
                    
                    mesh.position.copy(smoothedPos);
                    mesh.quaternion.copy(joint.quaternion);
                });

                // --- Catch Logic ---
                const isOp = isHandOpen(hand);
                const wristPos = hand.joints['wrist'].position;

                // Release logic: If holding but hand is closed (flick/drop)
                if (hand.userData.isHolding && !isOp) {
                    orbs.forEach(orb => {
                        if (orb.userData.heldBy === hand.userData.handedness) {
                            orb.userData.heldBy = null; // Drop it
                            orb.userData.baseY = orb.position.y; // Reset hover base
                        }
                    });
                    hand.userData.isHolding = false;
                }

                // Grab logic: If empty and hand is open
                if (!hand.userData.isHolding && isOp) {
                    for (let i = 0; i < orbs.length; i++) {
                        const orb = orbs[i];
                        if (orb.userData.heldBy !== null) continue; // Already held by other hand

                        const dist = wristPos.distanceTo(orb.position);
                        if (dist < CATCH_RADIUS) {
                            // Caught!
                            orb.userData.heldBy = hand.userData.handedness;
                            hand.userData.isHolding = true;
                            // Reset overload timer here eventually
                            break; 
                        }
                    }
                }
            });
        }

        function updateOrbs(time) {
            orbs.forEach(orb => {
                if (orb.userData.heldBy) {
                    // Update position to follow the hand holding it
                    const handIndex = orb.userData.heldBy === 'left' ? 0 : 1;
                    const hand = hands[handIndex];
                    if (hand && hand.joints && hand.joints['wrist']) {
                        const wristPos = hand.joints['wrist'].position;
                        // Lerp smoothly to the palm center instead of snapping instantly
                        orb.position.lerp(wristPos, 0.2); 
                    }
                } else {
                    // Idle bobbing animation
                    orb.position.y = orb.userData.baseY + Math.sin(time * 2 + orb.userData.phase) * 0.05;
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time, frame) {
            const timeSeconds = time * 0.001;
            
            heartStone.rotation.y += 0.01;
            heartStone.rotation.x += 0.005;

            if (renderer.xr.isPresenting) {
                updateHands();
            }

            updateOrbs(timeSeconds);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
