<!DOCTYPE html>
<html>
  <head>
    <title>Quantum Resonance: Floating Sector</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    
    <script>
      // 0. GAME MANAGER SYSTEM (Handles globals, score, and state cleanly)
      AFRAME.registerSystem('game-manager', {
        init: function() {
          this.targets = [];
          this.projectiles = [];
          this.score = 0;
          
          // Wait for DOM to load before grabbing UI elements
          this.el.addEventListener('loaded', () => {
            this.scoreEl = document.querySelector('#score-display');
            this.damageEl = document.querySelector('#damage-overlay');
          });
        },
        registerTarget: function(t) { this.targets.push(t); },
        unregisterTarget: function(t) {
          const idx = this.targets.indexOf(t);
          if (idx > -1) this.targets.splice(idx, 1);
        },
        registerProjectile: function(p) { this.projectiles.push(p); },
        unregisterProjectile: function(p) {
          const idx = this.projectiles.indexOf(p);
          if (idx > -1) this.projectiles.splice(idx, 1);
        },
        addScore: function() {
          this.score += 100;
          if (this.scoreEl) this.scoreEl.setAttribute('value', 'SCORE: ' + this.score);
        },
        takeDamage: function() {
          if (this.damageEl) {
            // Flash the screen red
            this.damageEl.setAttribute('material', 'opacity: 0.6');
            setTimeout(() => {
              this.damageEl.setAttribute('animation', 'property: material.opacity; to: 0; dur: 500; easing: easeOutQuad');
            }, 50);
            console.log("CRITICAL HIT. Hull integrity compromised.");
          }
        },
        spawnExplosion: function(pos) {
          // Visual feedback for destroyed targets
          const flash = document.createElement('a-entity');
          flash.setAttribute('geometry', 'primitive: sphere; radius: 0.2');
          flash.setAttribute('material', 'color: #ff00ff; shader: flat; transparent: true');
          flash.setAttribute('position', pos);
          flash.setAttribute('animation__scale', 'property: scale; to: 4 4 4; dur: 250; easing: easeOutQuad');
          flash.setAttribute('animation__fade', 'property: material.opacity; to: 0; dur: 250; easing: easeOutQuad');
          this.el.appendChild(flash);
          setTimeout(() => flash.parentNode.removeChild(flash), 300);
        }
      });

      // 1. THE SPATIAL TEAR SHADER (Now with smooth organic edges)
      AFRAME.registerShader('rift-void', {
        schema: {
          timeMsec: {type: 'time', is: 'uniform'},
          colorEdge: {type: 'color', is: 'uniform', default: '#00ffcc'}, 
          colorVoid: {type: 'color', is: 'uniform', default: '#050505'}  
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float timeMsec;
          uniform vec3 colorEdge;
          uniform vec3 colorVoid;
          varying vec2 vUv;

          float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }
          float noise(vec2 st) {
              vec2 i = floor(st); vec2 f = fract(st);
              float a = random(i); float b = random(i + vec2(1.0, 0.0));
              float c = random(i + vec2(0.0, 1.0)); float d = random(i + vec2(1.0, 1.0));
              vec2 u = f * f * (3.0 - 2.0 * f);
              return mix(a, b, u.x) + (c - a)* u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
          }

          void main() {
            float time = timeMsec / 1000.0; 
            vec2 p = vUv * 2.0 - 1.0;
            float r = length(p); 
            float a = atan(p.y, p.x); 

            float swirl = a + time * 3.0 - r * 4.0;
            float n = noise(vec2(cos(swirl), sin(swirl)) * 2.5 + time * 1.5);
            float distortedRadius = r + n * 0.3;

            float glowMask = smoothstep(0.5, 0.8, distortedRadius) * smoothstep(1.0, 0.8, distortedRadius);
            vec3 finalColor = mix(colorVoid, colorEdge, glowMask * 2.5);
            finalColor += colorEdge * noise(vec2(time * 20.0, a * 10.0)) * glowMask * 0.5;

            // Consultant fix #13: Smooth organic alpha instead of harsh jagged steps
            float alpha = smoothstep(0.95, 0.70, distortedRadius);
            gl_FragColor = vec4(finalColor, alpha);
          }
        `
      });

      // 2. FLOATING ENVIRONMENT GENERATOR
      AFRAME.registerComponent('floating-level', {
        init: function () {
          const scene = this.el.sceneEl.object3D;
          this.system = this.el.sceneEl.systems['game-manager'];
          
          scene.background = new THREE.Color(0x111122);
          scene.fog = new THREE.FogExp2(0x111122, 0.03);

          const ambientLight = new THREE.AmbientLight(0x404060);
          scene.add(ambientLight);

          const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
          dirLight.position.set(5, 20, 10);
          scene.add(dirLight);

          const fillLight = new THREE.PointLight(0x4466ff, 0.5);
          fillLight.position.set(-5, 0, 5);
          scene.add(fillLight);

          const backLight = new THREE.PointLight(0xffaa66, 0.3);
          backLight.position.set(0, 5, -15);
          scene.add(backLight);

          const starsGeometry = new THREE.BufferGeometry();
          const starsCount = 1000;
          const starPositions = new Float32Array(starsCount * 3);
          for (let i = 0; i < starsCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 200;
            starPositions[i+1] = (Math.random() - 0.5) * 200;
            starPositions[i+2] = (Math.random() - 0.5) * 200;
          }
          starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
          const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.2});
          this.stars = new THREE.Points(starsGeometry, starsMaterial);
          // Consultant fix #15: Prevent needless CPU culling math
          this.stars.frustumCulled = false; 
          scene.add(this.stars);

          this.platformGroup = new THREE.Group();

          const platformsData = [
            [6, 6, 1.5, 0x4a90e2, 0, 2, 0], 
            [2.5, 2.5, 0.8, 0xe67e22, -3, 3.5, -6],
            [2.5, 2.5, 0.8, 0xe67e22, 0, 4.0, -8],
            [2.5, 2.5, 0.8, 0xe67e22, 3, 3.5, -6],
            [2, 2, 0.6, 0x2ecc71, -5, 5.0, -10],
            [2, 2, 0.6, 0x2ecc71, 5, 4.5, -9],
            [3, 3, 1.0, 0xf1c40f, -2, 6.0, -12],
            [3, 3, 1.0, 0xf1c40f, 2, 5.0, -12],
            [1.5, 1.5, 0.5, 0xe74c3c, -4, 8.0, -15],
            [1.5, 1.5, 0.5, 0xe74c3c, 4, 7.5, -14]
          ];

          platformsData.forEach(data => {
            const [w, d, h, color, x, y, z] = data;
            const group = new THREE.Group();
            
            // Consultant fix #2: Set absolute position on the group so bobbing math works relative to origin
            group.position.set(x, y, z);
            
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshStandardMaterial({ 
              color: color, emissive: new THREE.Color(color).multiplyScalar(0.2), roughness: 0.4, metalness: 0.1
            });
            const cube = new THREE.Mesh(geometry, material);
            // Center cube vertically in its own group
            cube.position.set(0, h/2, 0);

            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 1 }));
            line.position.copy(cube.position);
            
            group.add(cube);
            group.add(line);
            
            // Generate targets
            if (z < -1) {
              const targetGeo = new THREE.OctahedronGeometry(0.4); 
              const targetMat = new THREE.MeshStandardMaterial({ color: 0xff0044, emissive: 0xaa0022, wireframe: true });
              const target = new THREE.Mesh(targetGeo, targetMat);
              // Float relative to the group
              target.position.set(0, h + 1.2, 0); 
              group.add(target);
              
              // Register to system, eliminating globals
              this.system.registerTarget(target);
              group.userData.targets = [target];
            }

            // Depth shadow underneath to fix VR spatial awareness (Consultant fix #11)
            if (z < -1) {
              const shadowGeo = new THREE.PlaneGeometry(w, d);
              const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.4, depthWrite: false });
              const shadow = new THREE.Mesh(shadowGeo, shadowMat);
              shadow.rotation.x = -Math.PI / 2;
              shadow.position.set(x, -10, z); // Project way down into the fog
              scene.add(shadow);
            }

            group.userData.originalY = group.position.y;
            group.userData.speed = 0.5 + Math.random() * 0.5;
            group.userData.offset = Math.random() * Math.PI * 2;
            
            this.platformGroup.add(group);
          });
          scene.add(this.platformGroup);

          const particleGeo = new THREE.BufferGeometry();
          const particleCount = 300;
          const particlePositions = new Float32Array(particleCount * 3);
          for (let i = 0; i < particleCount * 3; i += 3) {
            const r = 8 + Math.random() * 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            particlePositions[i] = Math.sin(phi) * Math.cos(theta) * r;
            particlePositions[i+1] = Math.sin(phi) * Math.sin(theta) * r * 0.5 + 6;
            particlePositions[i+2] = Math.cos(phi) * r;
          }
          particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
          const particleMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.1, transparent: true, opacity: 0.5 });
          this.particles = new THREE.Points(particleGeo, particleMat);
          this.particles.frustumCulled = false;
          scene.add(this.particles);
        },
        
        tick: function (time, timeDelta) {
          const elapsedTime = time / 1000;
          this.platformGroup.children.forEach(child => {
            child.position.y = child.userData.originalY + Math.sin(elapsedTime * child.userData.speed + child.userData.offset) * 0.15;
            child.rotation.y += 0.002;

            if (child.userData.targets) {
              child.userData.targets.forEach(t => {
                t.rotation.y += 0.05;
                t.rotation.x += 0.02;
              });
            }
          });
          this.stars.rotation.y += 0.0001;
          this.stars.rotation.x += 0.00005;
        }
      });

      // 3. PROJECTILE BEHAVIOR (Fully Optimized Memory Pool)
      AFRAME.registerComponent('projectile-behavior', {
        schema: {
          direction: {type: 'vec3'},
          speed: {type: 'number', default: 15}
        },
        init: function() {
          this.system = this.el.sceneEl.systems['game-manager'];
          this.system.registerProjectile(this.el);
          
          // Consultant fix #1: Vector caching to prevent GC stutter
          this.myPos = new THREE.Vector3();
          this.targetPos = new THREE.Vector3();
        },
        remove: function() {
          if (this.system) this.system.unregisterProjectile(this.el);
        },
        tick: function(time, timeDelta) {
          if (!this.el.parentNode) return; 

          const deltaSec = timeDelta / 1000;
          this.el.object3D.position.x += this.data.direction.x * this.data.speed * deltaSec;
          this.el.object3D.position.y += this.data.direction.y * this.data.speed * deltaSec;
          this.el.object3D.position.z += this.data.direction.z * this.data.speed * deltaSec;

          this.el.object3D.getWorldPosition(this.myPos);

          if (this.myPos.length() > 60) {
            this.el.parentNode.removeChild(this.el);
            return;
          }

          const targets = this.system.targets;
          for (let i = targets.length - 1; i >= 0; i--) {
            const t = targets[i];
            if (!t.parent) {
              this.system.unregisterTarget(t);
              continue;
            }
            
            t.getWorldPosition(this.targetPos);
            
            if (this.targetPos.distanceTo(this.myPos) < 0.8) {
              // Destroy target, spawn explosion, update score
              this.system.spawnExplosion(this.targetPos);
              this.system.addScore();
              
              t.parent.remove(t);
              this.system.unregisterTarget(t);
              this.el.parentNode.removeChild(this.el);
              return;
            }
          }
        }
      });

      // 4. FRACTAL PARASITE BEHAVIOR
      AFRAME.registerComponent('parasite-behavior', {
        init: function() {
          this.system = this.el.sceneEl.systems['game-manager'];
          this.camera = document.querySelector('a-camera');
          
          this.camPos = new THREE.Vector3();
          this.myPos = new THREE.Vector3();
          this.direction = new THREE.Vector3();
          this.pPos = new THREE.Vector3();
        },
        tick: function(time, timeDelta) {
          if (!this.el.parentNode) return;

          this.camera.object3D.getWorldPosition(this.camPos);
          this.el.object3D.getWorldPosition(this.myPos);
          
          this.direction.subVectors(this.camPos, this.myPos).normalize();
          const speed = 1.2;
          const deltaSec = timeDelta / 1000;

          this.el.object3D.position.addScaledVector(this.direction, speed * deltaSec);
          this.el.object3D.rotation.x += 0.05;
          this.el.object3D.rotation.y += 0.05;

          // Hit player logic (Consultant fix #6)
          if (this.myPos.distanceTo(this.camPos) < 0.6) {
            this.system.takeDamage();
            this.system.spawnExplosion(this.myPos);
            this.el.parentNode.removeChild(this.el);
            return;
          }

          // Check against optimized projectile array (Consultant fix #14)
          const projectiles = this.system.projectiles;
          for (let i = 0; i < projectiles.length; i++) {
            const p = projectiles[i];
            p.object3D.getWorldPosition(this.pPos);
            
            if (this.pPos.distanceTo(this.myPos) < 0.5) {
              this.system.spawnExplosion(this.myPos);
              this.system.addScore();
              
              this.el.parentNode.removeChild(this.el);
              p.parentNode.removeChild(p);
              return; 
            }
          }
        }
      });

      // 5. THE SPATIAL TEAR MANAGER
      AFRAME.registerComponent('rift-manager', {
        init: function () {
          this.leftPinching = false;
          this.rightPinching = false;
          this.rift = document.querySelector('#dimensional-rift');
          this.camera = document.querySelector('a-camera');
          this.lastSpawnTime = 0;
          
          // Wait for DOM to load hand entities safely (Consultant fix #3)
          this.el.addEventListener('loaded', () => {
            const leftHand = document.querySelector('#leftHand');
            const rightHand = document.querySelector('#rightHand');

            leftHand.addEventListener('pinchstarted', () => this.leftPinching = true);
            leftHand.addEventListener('pinchended', () => { this.leftPinching = false; this.collapseRift(); });

            rightHand.addEventListener('pinchstarted', () => this.rightPinching = true);
            rightHand.addEventListener('pinchended', () => { this.rightPinching = false; this.collapseRift(); });
          });
        },
        
        tick: function (time) {
          if (this.leftPinching && this.rightPinching) {
            const leftEl = document.querySelector('#leftHand');
            const rightEl = document.querySelector('#rightHand');
            
            if (!leftEl || !rightEl) return;

            const leftPos = new THREE.Vector3();
            const rightPos = new THREE.Vector3();
            leftEl.object3D.getWorldPosition(leftPos);
            rightEl.object3D.getWorldPosition(rightPos);
            
            const distance = leftPos.distanceTo(rightPos);
            const tearScale = Math.max(0.1, distance * 5); 
            
            const midPoint = new THREE.Vector3().addVectors(leftPos, rightPos).multiplyScalar(0.5);
            
            this.rift.object3D.position.copy(midPoint);
            this.rift.object3D.scale.set(tearScale, tearScale, 1); 
            this.rift.object3D.visible = true;
            
            const camPos = new THREE.Vector3();
            this.camera.object3D.getWorldPosition(camPos);
            this.rift.object3D.lookAt(camPos);

            if (tearScale > 1.0 && time - this.lastSpawnTime > 800) {
              this.spawnParasite(midPoint);
              this.lastSpawnTime = time;
            }
          }
        },

        spawnParasite: function(position) {
          const parasite = document.createElement('a-entity');
          parasite.setAttribute('geometry', 'primitive: octahedron; radius: 0.15');
          parasite.setAttribute('material', 'color: #ff0044; wireframe: true');
          parasite.setAttribute('position', `${position.x} ${position.y} ${position.z + 0.2}`);
          parasite.setAttribute('parasite-behavior', '');
          this.el.sceneEl.appendChild(parasite);
        },

        collapseRift: function() {
          this.rift.object3D.scale.set(0, 0, 0);
          this.rift.object3D.visible = false;
        }
      });

      // 6. THE SKELETAL HAND CANNON 
      AFRAME.registerComponent('hand-cannon', {
        init: function () {
          this.cooldown = false;
          this.camera = document.querySelector('a-camera');

          this.gunMesh = document.createElement('a-entity');
          this.gunMesh.setAttribute('geometry', 'primitive: cylinder; radius: 0.01; height: 0.15');
          this.gunMesh.setAttribute('material', 'color: #0088ff; wireframe: true');
          this.gunMesh.setAttribute('rotation', '90 0 0');
          this.el.appendChild(this.gunMesh);

          // Consultant fix #10: Muzzle Flash
          this.muzzleFlash = document.createElement('a-entity');
          this.muzzleFlash.setAttribute('geometry', 'primitive: sphere; radius: 0.05');
          this.muzzleFlash.setAttribute('material', 'color: #ffffff; shader: flat');
          this.muzzleFlash.setAttribute('position', '0 0.1 0'); // Top of the barrel
          this.muzzleFlash.setAttribute('visible', 'false');
          this.gunMesh.appendChild(this.muzzleFlash);

          this.laser = document.createElement('a-entity');
          this.laser.setAttribute('geometry', 'primitive: cylinder; radius: 0.003; height: 20');
          this.laser.setAttribute('material', 'color: #ff0044; shader: flat; transparent: true; opacity: 0.5');
          this.laser.setAttribute('rotation', '90 0 0'); 
          this.laser.setAttribute('position', '0 0 -10'); 
          
          this.laserPivot = document.createElement('a-entity');
          this.laserPivot.appendChild(this.laser);
          this.laserPivot.setAttribute('visible', false);
          this.el.appendChild(this.laserPivot);

          this.handMesh = null;
          this.defaultColor = null;
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (mesh) {
              mesh.traverse((node) => {
                if (node.isMesh && node.material) {
                  this.handMesh = node;
                  this.handMesh.material = node.material.clone(); 
                  this.defaultColor = this.handMesh.material.color.clone();
                }
              });
            }
          });
        },
        
        tick: function (time, timeDelta) {
          const trackingComponent = this.el.components['hand-tracking-controls'];
          if (!trackingComponent || !trackingComponent.bones || trackingComponent.bones.length === 0) return;

          const bones = trackingComponent.bones;
          
          const wristPos = new THREE.Vector3();
          const thumbTipPos = new THREE.Vector3();
          const indexBasePos = new THREE.Vector3();
          const indexTipPos = new THREE.Vector3();
          const middleTipPos = new THREE.Vector3();

          bones[0].getWorldPosition(wristPos);
          bones[4].getWorldPosition(thumbTipPos);
          bones[5].getWorldPosition(indexBasePos);
          bones[9].getWorldPosition(indexTipPos);
          bones[14].getWorldPosition(middleTipPos);

          const aimDirection = new THREE.Vector3().subVectors(indexTipPos, wristPos).normalize();

          this.gunMesh.object3D.position.copy(indexBasePos);
          this.gunMesh.object3D.position.y += 0.02; 
          this.gunMesh.object3D.lookAt(indexTipPos);

          const indexLength = indexTipPos.distanceTo(wristPos);
          const midLength = middleTipPos.distanceTo(wristPos);
          const isGunPose = (midLength < indexLength * 0.75);

          if (isGunPose) {
            this.laserPivot.setAttribute('visible', true);
            this.laserPivot.object3D.position.copy(indexTipPos);
            
            const targetPoint = new THREE.Vector3().copy(indexTipPos).add(aimDirection);
            this.laserPivot.object3D.lookAt(targetPoint);

            if (this.handMesh) {
              const hue = (time % 2000) / 2000;
              this.handMesh.material.color.setHSL(hue, 1.0, 0.5);
              this.handMesh.material.emissive.setHSL(hue, 1.0, 0.2);
            }
          } else {
            this.laserPivot.setAttribute('visible', false);
            if (this.handMesh && this.defaultColor) {
              this.handMesh.material.color.copy(this.defaultColor);
              this.handMesh.material.emissive.setHex(0x000000);
            }
          }

          if (this.cooldown) return;

          const hammerDistance = thumbTipPos.distanceTo(indexBasePos);
          
          if (isGunPose && hammerDistance < 0.045) { 
            this.fireCannon(indexTipPos, aimDirection);
          }
        },

        fireCannon: function(originPos, aimVector) {
          this.cooldown = true;
          this.gunMesh.setAttribute('material', 'color: #ffffff; wireframe: false');
          this.muzzleFlash.setAttribute('visible', 'true');

          const projectile = document.createElement('a-entity');
          
          // Consultant fix #9: Projectile trail (Stretched sphere aligns perfectly to velocity)
          projectile.setAttribute('geometry', 'primitive: sphere; radius: 0.06');
          projectile.setAttribute('material', 'color: #00ffcc; shader: flat');
          projectile.setAttribute('position', originPos);
          
          // Stretch it along the Z axis to create a blaster bolt
          projectile.object3D.scale.set(1, 1, 4);
          const alignmentPoint = new THREE.Vector3().copy(originPos).add(aimVector);
          projectile.object3D.lookAt(alignmentPoint);

          projectile.setAttribute('projectile-behavior', `direction: ${aimVector.x} ${aimVector.y} ${aimVector.z}`);
          this.el.sceneEl.appendChild(projectile);

          setTimeout(() => { 
            this.gunMesh.setAttribute('material', 'color: #0088ff; wireframe: true');
            this.muzzleFlash.setAttribute('visible', 'false');
            this.cooldown = false; 
          }, 300);
        }
      });
    </script>
  </head>
  <body>
    <!-- The Game Manager sits at the root to process events cleanly -->
    <a-scene webxr="optionalFeatures: hand-tracking;" floating-level rift-manager game-manager>

      <a-entity id="dimensional-rift" 
                geometry="primitive: plane; width: 1; height: 1" 
                material="shader: rift-void; transparent: true; side: double; depthWrite: false" 
                visible="false">
      </a-entity>

      <a-entity id="rig" position="0 3.5 0">
        <!-- Consultant fix #4 & #6: HUD and Damage overlay slaved directly to the user's face -->
        <a-camera position="0 1.6 0">
          <a-text id="score-display" value="SCORE: 0" position="0 -0.2 -1" align="center" width="2" color="#00ffcc" font="monoid"></a-text>
          <a-plane id="damage-overlay" position="0 0 -0.5" width="4" height="4" material="color: #ff0000; transparent: true; opacity: 0; shader: flat" depth-test="false"></a-plane>
        </a-camera>
        
        <a-entity id="leftHand" hand-tracking-controls="hand: left;" hand-cannon></a-entity>
        <a-entity id="rightHand" hand-tracking-controls="hand: right;" hand-cannon></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
