<!DOCTYPE html>
<html>
  <head>
    <title>Quantum Resonance: Enhanced Floating Sector</title>
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script>
      // ============================
      // 1. SPATIAL TEAR SHADER (improved glow)
      // ============================
      AFRAME.registerShader('rift-void', {
        schema: {
          timeMsec: { type: 'time', is: 'uniform' },
          colorEdge: { type: 'color', is: 'uniform', default: '#00ffcc' },
          colorVoid: { type: 'color', is: 'uniform', default: '#050505' }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float timeMsec;
          uniform vec3 colorEdge;
          uniform vec3 colorVoid;
          varying vec2 vUv;

          float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }
          float noise(vec2 st) {
              vec2 i = floor(st); vec2 f = fract(st);
              float a = random(i); float b = random(i + vec2(1.0, 0.0));
              float c = random(i + vec2(0.0, 1.0)); float d = random(i + vec2(1.0, 1.0));
              vec2 u = f * f * (3.0 - 2.0 * f);
              return mix(a, b, u.x) + (c - a)* u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
          }

          void main() {
            float time = timeMsec / 1000.0; 
            vec2 p = vUv * 2.0 - 1.0;
            float r = length(p); 
            float a = atan(p.y, p.x); 

            float swirl = a + time * 3.0 - r * 4.0;
            float n = noise(vec2(cos(swirl), sin(swirl)) * 2.5 + time * 1.5);
            float distortedRadius = r + n * 0.3;

            float glowMask = smoothstep(0.5, 0.8, distortedRadius) * smoothstep(1.0, 0.8, distortedRadius);
            vec3 finalColor = mix(colorVoid, colorEdge, glowMask * 2.5);
            finalColor += colorEdge * noise(vec2(time * 20.0, a * 10.0)) * glowMask * 0.5;

            float alpha = step(distortedRadius, 0.9);
            gl_FragColor = vec4(finalColor, alpha);
          }
        `
      });

      // ============================
      // 2. FLOATING LEVEL (fixed bobbing + targets as children)
      // ============================
      AFRAME.registerComponent('floating-level', {
        init: function () {
          const scene = this.el.sceneEl.object3D;
          
          scene.background = new THREE.Color(0x111122);
          scene.fog = new THREE.Fog(0x111122, 20, 60);

          // Lights
          const ambientLight = new THREE.AmbientLight(0x404060);
          scene.add(ambientLight);
          const dirLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
          dirLight.position.set(5, 20, 10);
          scene.add(dirLight);
          const fillLight = new THREE.PointLight(0x4466ff, 0.5);
          fillLight.position.set(-5, 0, 5);
          scene.add(fillLight);
          const backLight = new THREE.PointLight(0xffaa66, 0.3);
          backLight.position.set(0, 5, -15);
          scene.add(backLight);

          // Stars
          const starsGeometry = new THREE.BufferGeometry();
          const starsCount = 1000;
          const starPositions = new Float32Array(starsCount * 3);
          for (let i = 0; i < starsCount * 3; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 200;
            starPositions[i+1] = (Math.random() - 0.5) * 200;
            starPositions[i+2] = (Math.random() - 0.5) * 200;
          }
          starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
          const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.2});
          this.stars = new THREE.Points(starsGeometry, starsMaterial);
          scene.add(this.stars);

          // Holds all platforms
          this.platforms = []; 
          window.shootableTargets = []; // global for collision

          // Platform definitions: [width, depth, height, color, x, y, z]
          const platformsData = [
            [6, 6, 1.5, 0x4a90e2, 0, 2, 0],   // floor
            [2.5, 2.5, 0.8, 0xe67e22, -3, 3.5, -6],
            [2.5, 2.5, 0.8, 0xe67e22, 0, 4.0, -8],
            [2.5, 2.5, 0.8, 0xe67e22, 3, 3.5, -6],
            [2, 2, 0.6, 0x2ecc71, -5, 5.0, -10],
            [2, 2, 0.6, 0x2ecc71, 5, 4.5, -9],
            [3, 3, 1.0, 0xf1c40f, -2, 6.0, -12],
            [3, 3, 1.0, 0xf1c40f, 2, 5.0, -12],
            [1.5, 1.5, 0.5, 0xe74c3c, -4, 8.0, -15],
            [1.5, 1.5, 0.5, 0xe74c3c, 4, 7.5, -14]
          ];

          platformsData.forEach(data => {
            const [w, d, h, color, x, y, z] = data;
            
            // Create a group per platform so they can bob independently
            const group = new THREE.Group();
            group.position.set(x, y + h/2, z); // base at y, cube center at y+h/2

            // Store bobbing parameters on the group
            group.userData = {
              bobSpeed: 0.5 + Math.random() * 0.5,
              bobOffset: Math.random() * Math.PI * 2,
              baseY: y + h/2
            };

            // The solid cube
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshStandardMaterial({ 
              color: color, 
              emissive: new THREE.Color(color).multiplyScalar(0.2), 
              roughness: 0.4, 
              metalness: 0.1
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(0, 0, 0); // relative to group
            group.add(cube);

            // Edges
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff }));
            line.position.copy(cube.position);
            group.add(line);

            // Add target if not the floor
            if (z < -1) {
              const targetGeo = new THREE.OctahedronGeometry(0.5); // slightly larger
              const targetMat = new THREE.MeshStandardMaterial({ color: 0xff0044, emissive: 0xaa0022, wireframe: true });
              const target = new THREE.Mesh(targetGeo, targetMat);
              target.position.set(0, h/2 + 1.2, 0); // above cube
              group.add(target);
              
              window.shootableTargets.push(target);
              group.userData.targets = [target];
            }

            scene.add(group);
            this.platforms.push(group);
          });

          // Floating particles
          const particleGeo = new THREE.BufferGeometry();
          const particleCount = 300;
          const particlePositions = new Float32Array(particleCount * 3);
          for (let i = 0; i < particleCount * 3; i += 3) {
            const r = 8 + Math.random() * 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            particlePositions[i] = Math.sin(phi) * Math.cos(theta) * r;
            particlePositions[i+1] = Math.sin(phi) * Math.sin(theta) * r * 0.5 + 6;
            particlePositions[i+2] = Math.cos(phi) * r;
          }
          particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
          const particleMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.1, transparent: true, opacity: 0.5 });
          this.particles = new THREE.Points(particleGeo, particleMat);
          scene.add(this.particles);
        },
        
        tick: function (time, timeDelta) {
          const elapsed = time / 1000;
          
          // Bob each platform individually
          this.platforms.forEach(platform => {
            if (platform.userData.baseY !== undefined) {
              platform.position.y = platform.userData.baseY + 
                Math.sin(elapsed * platform.userData.bobSpeed + platform.userData.bobOffset) * 0.15;
            }
            // Rotate whole platform slowly
            platform.rotation.y += 0.002;

            // Spin targets inside
            if (platform.userData.targets) {
              platform.userData.targets.forEach(t => {
                t.rotation.y += 0.05;
                t.rotation.x += 0.02;
              });
            }
          });

          this.stars.rotation.y += 0.0001;
          this.stars.rotation.x += 0.00005;
        }
      });

      // ============================
      // 3. PROJECTILE (with trail and light)
      // ============================
      AFRAME.registerComponent('projectile-behavior', {
        schema: {
          direction: { type: 'vec3' },
          speed: { type: 'number', default: 15 } // slightly slower for visibility
        },
        init: function () {
          // Add a point light to the projectile
          const light = document.createElement('a-light');
          light.setAttribute('type', 'point');
          light.setAttribute('color', '#00ffff');
          light.setAttribute('intensity', '1.5');
          light.setAttribute('distance', '5');
          light.setAttribute('decay', '2');
          this.light = light;
          this.el.appendChild(light);

          // Simple trail using a second smaller sphere behind
          const trail = document.createElement('a-entity');
          trail.setAttribute('geometry', 'primitive: sphere; radius: 0.04');
          trail.setAttribute('material', 'color: #88ffaa; emissive: #2266aa');
          trail.setAttribute('position', '-0.1 0 0'); // behind relative to direction? We'll update in tick
          this.trail = trail;
          this.el.appendChild(trail);

          this.directionVec = new THREE.Vector3(this.data.direction.x, this.data.direction.y, this.data.direction.z);
        },

        tick: function (time, timeDelta) {
          if (!this.el.parentNode) return;

          const deltaSec = timeDelta / 1000;
          const pos = this.el.object3D.position;
          pos.x += this.data.direction.x * this.data.speed * deltaSec;
          pos.y += this.data.direction.y * this.data.speed * deltaSec;
          pos.z += this.data.direction.z * this.data.speed * deltaSec;

          // Update trail position: slightly behind along direction
          if (this.trail) {
            this.trail.object3D.position.copy(this.directionVec.clone().multiplyScalar(-0.15));
          }

          if (pos.length() > 60) {
            this.el.parentNode.removeChild(this.el);
            return;
          }

          // Collision with targets
          const myPos = pos;
          if (window.shootableTargets) {
            for (let i = window.shootableTargets.length - 1; i >= 0; i--) {
              const t = window.shootableTargets[i];
              if (!t.parent) {
                window.shootableTargets.splice(i, 1); 
                continue;
              }
              
              const targetPos = new THREE.Vector3();
              t.getWorldPosition(targetPos);
              
              if (targetPos.distanceTo(myPos) < 1.0) { // more forgiving
                // Remove target
                t.parent.remove(t);
                window.shootableTargets.splice(i, 1);
                
                // Update score
                const scoreEl = document.getElementById('score');
                if (scoreEl) {
                  let val = parseInt(scoreEl.getAttribute('value')) + 1;
                  scoreEl.setAttribute('value', val);
                }

                // Haptic feedback on hit (if hands available)
                tryHapticPulse(0.5, 50);

                // Remove projectile
                this.el.parentNode.removeChild(this.el);
                return;
              }
            }
          }
        }
      });

      // Helper for haptic pulses
      function tryHapticPulse(intensity, duration) {
        ['leftHand', 'rightHand'].forEach(id => {
          const hand = document.getElementById(id);
          if (hand && hand.components['hand-tracking-controls']) {
            hand.components['hand-tracking-controls'].pulse(intensity, duration);
          }
        });
      }

      // ============================
      // 4. FRACTAL PARASITE (with death sound/haptics)
      // ============================
      AFRAME.registerComponent('parasite-behavior', {
        tick: function (time, timeDelta) {
          const cam = document.querySelector('a-camera');
          if (!cam) return;
          const camPos = cam.object3D.position;
          const myPos = this.el.object3D.position;
          
          const direction = new THREE.Vector3().subVectors(camPos, myPos).normalize();
          const speed = 1.2;
          const deltaSec = timeDelta / 1000;

          myPos.addScaledVector(direction, speed * deltaSec);
          this.el.object3D.rotation.x += 0.05;
          this.el.object3D.rotation.y += 0.05;

          // Check collision with projectiles
          const projectiles = document.querySelectorAll('[projectile-behavior]');
          for (let i = 0; i < projectiles.length; i++) {
            const p = projectiles[i];
            if (p.object3D.position.distanceTo(myPos) < 0.5) {
              // Remove parasite and projectile
              this.el.parentNode.removeChild(this.el);
              p.parentNode.removeChild(p);
              
              // Score for parasite kill
              const scoreEl = document.getElementById('score');
              if (scoreEl) {
                let val = parseInt(scoreEl.getAttribute('value')) + 2;
                scoreEl.setAttribute('value', val);
              }

              tryHapticPulse(0.6, 80);
              break; 
            }
          }
        }
      });

      // ============================
      // 5. RIFT MANAGER (fixed event names)
      // ============================
      AFRAME.registerComponent('rift-manager', {
        init: function () {
          this.leftPinching = false;
          this.rightPinching = false;
          this.rift = document.querySelector('#dimensional-rift');
          this.camera = document.querySelector('a-camera');
          this.lastSpawnTime = 0;
          
          const leftHand = document.querySelector('#leftHand');
          const rightHand = document.querySelector('#rightHand');

          // Correct event names: 'pinchstart' and 'pinchend'
          leftHand.addEventListener('pinchstart', () => this.leftPinching = true);
          leftHand.addEventListener('pinchend', () => { this.leftPinching = false; this.collapseRift(); });

          rightHand.addEventListener('pinchstart', () => this.rightPinching = true);
          rightHand.addEventListener('pinchend', () => { this.rightPinching = false; this.collapseRift(); });
        },
        
        tick: function (time) {
          if (this.leftPinching && this.rightPinching) {
            const leftEl = document.querySelector('#leftHand');
            const rightEl = document.querySelector('#rightHand');
            
            const leftPos = new THREE.Vector3();
            const rightPos = new THREE.Vector3();
            leftEl.object3D.getWorldPosition(leftPos);
            rightEl.object3D.getWorldPosition(rightPos);
            
            const distance = leftPos.distanceTo(rightPos);
            const tearScale = Math.max(0.1, distance * 5); 
            
            const midPoint = new THREE.Vector3().addVectors(leftPos, rightPos).multiplyScalar(0.5);
            
            this.rift.object3D.position.copy(midPoint);
            this.rift.object3D.scale.set(tearScale, tearScale, 1); 
            this.rift.object3D.visible = true;
            
            const camPos = this.camera.object3D.position;
            this.rift.object3D.lookAt(camPos);

            // Spawn parasites when rift is large enough
            if (tearScale > 1.0 && time - this.lastSpawnTime > 800) {
              this.spawnParasite(midPoint);
              this.lastSpawnTime = time;
            }
          }
        },

        spawnParasite: function(position) {
          const parasite = document.createElement('a-entity');
          parasite.setAttribute('geometry', 'primitive: octahedron; radius: 0.2');
          parasite.setAttribute('material', 'color: #ff0044; wireframe: true');
          parasite.setAttribute('position', `${position.x} ${position.y} ${position.z + 0.2}`);
          parasite.setAttribute('parasite-behavior', '');
          this.el.sceneEl.appendChild(parasite);
        },

        collapseRift: function() {
          this.rift.object3D.scale.set(0, 0, 0);
          this.rift.object3D.visible = false;
        }
      });

      // ============================
      // 6. HAND CANNON (fixed laser, improved pose detection)
      // ============================
      AFRAME.registerComponent('hand-cannon', {
        init: function () {
          this.cooldown = false;
          this.camera = document.querySelector('a-camera');

          // Gun mesh (small cylinder at palm)
          this.gunMesh = document.createElement('a-entity');
          this.gunMesh.setAttribute('geometry', 'primitive: cylinder; radius: 0.01; height: 0.15');
          this.gunMesh.setAttribute('material', 'color: #0088ff; wireframe: true');
          this.gunMesh.setAttribute('rotation', '90 0 0');
          this.el.appendChild(this.gunMesh);

          // LASER POINTER (FIXED ORIENTATION)
          // Create a cylinder that extends forward from the tip
          this.laser = document.createElement('a-entity');
          this.laser.setAttribute('geometry', 'primitive: cylinder; radius: 0.003; height: 20');
          this.laser.setAttribute('material', 'color: #ff0044; shader: flat; transparent: true; opacity: 0.6');
          this.laser.setAttribute('rotation', '90 0 0'); // align cylinder with Z
          this.laser.setAttribute('position', '0 0 10'); // center at half length, so base at 0, tip at 20

          this.laserPivot = document.createElement('a-entity');
          this.laserPivot.appendChild(this.laser);
          this.laserPivot.setAttribute('visible', false);
          this.el.appendChild(this.laserPivot);

          // For hand coloring
          this.handMesh = null;
          this.defaultColor = null;
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (mesh) {
              mesh.traverse((node) => {
                if (node.isMesh && node.material) {
                  this.handMesh = node;
                  this.handMesh.material = node.material.clone(); 
                  this.defaultColor = this.handMesh.material.color.clone();
                }
              });
            }
          });
        },
        
        tick: function (time, timeDelta) {
          const tracking = this.el.components['hand-tracking-controls'];
          if (!tracking || !tracking.bones || tracking.bones.length === 0) return;

          const bones = tracking.bones;
          
          // Bone indices (typical for Oculus hand model)
          const wrist = bones[0];
          const thumbTip = bones[4];
          const indexBase = bones[5];
          const indexTip = bones[9];
          const middleTip = bones[14];

          if (!wrist || !thumbTip || !indexBase || !indexTip || !middleTip) return;

          const wristPos = wrist.getWorldPosition(new THREE.Vector3());
          const thumbTipPos = thumbTip.getWorldPosition(new THREE.Vector3());
          const indexBasePos = indexBase.getWorldPosition(new THREE.Vector3());
          const indexTipPos = indexTip.getWorldPosition(new THREE.Vector3());
          const middleTipPos = middleTip.getWorldPosition(new THREE.Vector3());

          // Aim direction: from wrist to index tip (pointing)
          const aimDirection = new THREE.Vector3().subVectors(indexTipPos, wristPos).normalize();

          // Position gun mesh near index base
          this.gunMesh.object3D.position.copy(indexBasePos);
          this.gunMesh.object3D.position.y += 0.02; 
          this.gunMesh.object3D.lookAt(indexTipPos);

          // Gun pose detection: middle finger curled (tip closer to wrist than index tip)
          const indexLen = indexTipPos.distanceTo(wristPos);
          const middleLen = middleTipPos.distanceTo(wristPos);
          const isGunPose = middleLen < indexLen * 0.8; 

          if (isGunPose) {
            // Show laser
            this.laserPivot.setAttribute('visible', true);
            this.laserPivot.object3D.position.copy(indexTipPos);
            // Point laser forward
            const targetPoint = indexTipPos.clone().add(aimDirection);
            this.laserPivot.object3D.lookAt(targetPoint);

            // Color hand
            if (this.handMesh) {
              const hue = (time % 2000) / 2000;
              this.handMesh.material.color.setHSL(hue, 1.0, 0.5);
              this.handMesh.material.emissive.setHSL(hue, 1.0, 0.2);
            }
          } else {
            this.laserPivot.setAttribute('visible', false);
            if (this.handMesh && this.defaultColor) {
              this.handMesh.material.color.copy(this.defaultColor);
              this.handMesh.material.emissive.setHex(0x000000);
            }
          }

          if (this.cooldown) return;

          // Fire when thumb tip touches index base
          const hammerDistance = thumbTipPos.distanceTo(indexBasePos);
          if (isGunPose && hammerDistance < 0.05) { 
            this.fireCannon(indexTipPos, aimDirection);
          }
        },

        fireCannon: function(originPos, aimVector) {
          this.cooldown = true;
          this.gunMesh.setAttribute('material', 'color: #ffffff; wireframe: false');

          // Create projectile
          const projectile = document.createElement('a-entity');
          projectile.setAttribute('geometry', 'primitive: sphere; radius: 0.1');
          projectile.setAttribute('material', 'color: #00ffcc; emissive: #006688');
          projectile.setAttribute('position', originPos);
          projectile.setAttribute('projectile-behavior', `direction: ${aimVector.x} ${aimVector.y} ${aimVector.z}`);

          // Add a point light to projectile (done in its component)
          this.el.sceneEl.appendChild(projectile);

          // Haptic feedback
          tryHapticPulse(0.3, 30);

          // Cooldown visual
          setTimeout(() => { 
            this.gunMesh.setAttribute('material', 'color: #0088ff; wireframe: true');
            this.cooldown = false; 
          }, 250);
        }
      });
    </script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hand-tracking;" floating-level rift-manager>

      <!-- UI: Score display -->
      <a-text id="score" value="0" position="-1 2 -3" scale="2 2 2" color="#00ffcc" align="center" 
              font="mozillavr" side="double" anchor="center" baseline="center"></a-text>
      <a-text value="Pinch both hands to open rift. Make gun pose (index up, thumb near base) to fire." 
              position="0 1.5 -2" scale="0.8 0.8 0.8" color="#88aaff" align="center" width="6"></a-text>

      <!-- Dimensional rift plane -->
      <a-entity id="dimensional-rift" 
                geometry="primitive: plane; width: 1; height: 1" 
                material="shader: rift-void; transparent: true; side: double; depthWrite: false" 
                visible="false">
      </a-entity>

      <!-- Camera rig with both hands -->
      <a-entity id="rig" position="0 3.5 0">
        <a-camera position="0 1.6 0"></a-camera>
        <a-entity id="leftHand" hand-tracking-controls="hand: left;" hand-cannon></a-entity>
        <a-entity id="rightHand" hand-tracking-controls="hand: right;" hand-cannon></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
