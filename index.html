<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Weaver - Phase 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: monospace; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Echo Weaver: Phase 3<br/>Defend the Heart Stone. Spells: Line (Beam), Triangle (Repulse), Cross/X (Barrage).</div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        // --- System Globals ---
        let camera, scene, renderer;
        let heartStone, healthRing;
        let heartHealth = 100;
        let orbs = []; // Ammunition
        let enemies = []; // Hostiles
        const hands = [null, null]; // Left, Right
        
        // --- Settings ---
        const EMA_ALPHA = 0.4; 
        const CATCH_RADIUS = 0.15; 
        const PINCH_THRESH = 0.03;
        const ENEMY_SPAWN_RATE = 3.0; // Seconds between enemy spawns
        const ORB_SPAWN_RATE = 2.0;   // Seconds between ammo spawns
        let enemySpawnTimer = 0;
        let orbSpawnTimer = 0;

        const smoothedJoints = new Map();

        // --- Trail Rendering ---
        const MAX_TRAIL_POINTS = 150;
        let trailGeo, trailLine;
        const trailPositions = new Float32Array(MAX_TRAIL_POINTS * 3);
        let currentTrailCount = 0;
        let isDrawing = false;
        let drawPoints3D = [];
        let activeCastingHand = null;

        // --- $1 Recognizer Implementation (Compact) ---
        class Point { constructor(x, y) { this.x = x; this.y = y; } }
        class GestureRecognizer {
            constructor() {
                this.NumPoints = 64;
                this.SquareSize = 250.0;
                this.HalfDiagonal = 0.5 * Math.sqrt(250.0 * 250.0 + 250.0 * 250.0);
                this.AngleRange = this.deg2Rad(45.0);
                this.AnglePrecision = this.deg2Rad(2.0);
                this.Templates = [];
                this.setupTemplates();
            }
            deg2Rad(d) { return (d * Math.PI / 180.0); }
            Distance(p1, p2) { return Math.sqrt((p2.x - p1.x)*(p2.x - p1.x) + (p2.y - p1.y)*(p2.y - p1.y)); }
            PathLength(points) { let d = 0; for(let i=1; i<points.length; i++) d += this.Distance(points[i-1], points[i]); return d; }
            Resample(points, n) {
                let I = this.PathLength(points) / (n - 1);
                let D = 0.0;
                let newpoints = [points[0]];
                for (let i = 1; i < points.length; i++) {
                    let d = this.Distance(points[i-1], points[i]);
                    if ((D + d) >= I) {
                        let qx = points[i-1].x + ((I - D) / d) * (points[i].x - points[i-1].x);
                        let qy = points[i-1].y + ((I - D) / d) * (points[i].y - points[i-1].y);
                        let q = new Point(qx, qy);
                        newpoints.push(q);
                        points.splice(i, 0, q);
                        D = 0.0;
                    } else D += d;
                }
                if (newpoints.length == n - 1) newpoints.push(points[points.length - 1]);
                return newpoints;
            }
            Centroid(points) {
                let x = 0.0, y = 0.0;
                for (let i = 0; i < points.length; i++) { x += points[i].x; y += points[i].y; }
                return new Point(x / points.length, y / points.length);
            }
            RotateBy(points, radians) {
                let c = this.Centroid(points);
                let cos = Math.cos(radians), sin = Math.sin(radians);
                let newpoints = [];
                for (let i = 0; i < points.length; i++) {
                    let qx = (points[i].x - c.x) * cos - (points[i].y - c.y) * sin + c.x;
                    let qy = (points[i].x - c.x) * sin + (points[i].y - c.y) * cos + c.y;
                    newpoints.push(new Point(qx, qy));
                }
                return newpoints;
            }
            ScaleTo(points, size) {
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                for (let i = 0; i < points.length; i++) {
                    minX = Math.min(minX, points[i].x); maxX = Math.max(maxX, points[i].x);
                    minY = Math.min(minY, points[i].y); maxY = Math.max(maxY, points[i].y);
                }
                let newpoints = [];
                for (let i = 0; i < points.length; i++) {
                    let qx = points[i].x * (size / Math.max(maxX - minX, 1.0)); 
                    let qy = points[i].y * (size / Math.max(maxY - minY, 1.0));
                    newpoints.push(new Point(qx, qy));
                }
                return newpoints;
            }
            TranslateTo(points, pt) {
                let c = this.Centroid(points);
                let newpoints = [];
                for (let i = 0; i < points.length; i++) { newpoints.push(new Point(points[i].x + pt.x - c.x, points[i].y + pt.y - c.y)); }
                return newpoints;
            }
            DistanceAtBestAngle(points, T, a, b, threshold) {
                let x1 = 0.38197 * a + 0.61803 * b;
                let f1 = this.DistanceAtAngle(points, T, x1);
                let x2 = 0.61803 * a + 0.38197 * b;
                let f2 = this.DistanceAtAngle(points, T, x2);
                while (Math.abs(b - a) > threshold) {
                    if (f1 < f2) { b = x2; x2 = x1; f2 = f1; x1 = 0.38197 * a + 0.61803 * b; f1 = this.DistanceAtAngle(points, T, x1); } 
                    else { a = x1; x1 = x2; f1 = f2; x2 = 0.61803 * a + 0.38197 * b; f2 = this.DistanceAtAngle(points, T, x2); }
                }
                return Math.min(f1, f2);
            }
            DistanceAtAngle(points, T, radians) {
                let newpoints = this.RotateBy(points, radians);
                let d = 0;
                for (let i = 0; i < points.length; i++) d += this.Distance(newpoints[i], T.Points[i]);
                return d / points.length;
            }
            Normalize(points) {
                points = this.Resample(points, this.NumPoints);
                let radians = Math.atan2(points[0].y - this.Centroid(points).y, points[0].x - this.Centroid(points).x);
                points = this.RotateBy(points, -radians);
                points = this.ScaleTo(points, this.SquareSize);
                points = this.TranslateTo(points, new Point(0, 0));
                return points;
            }
            setupTemplates() {
                const addT = (name, pts) => this.Templates.push({Name: name, Points: this.Normalize(pts)});
                
                // Line
                addT('line', [new Point(0,0), new Point(100,0)]);
                
                // Triangle
                addT('triangle', [new Point(50,10), new Point(10,90), new Point(90,90), new Point(50,10)]);

                // Single-stroke Cross (Down, up-middle, left, right)
                addT('cross', [new Point(50,10), new Point(50,90), new Point(50,50), new Point(10,50), new Point(90,50)]);
                
                // Single-stroke X (Diagonal down-right, up, diagonal down-left)
                addT('x', [new Point(10,10), new Point(90,90), new Point(90,10), new Point(10,90)]);
            }
            Recognize(points) {
                if(points.length < 10) return { Name: 'none', Score: 0 };
                points = this.Normalize(points);
                let b = Infinity;
                let t = -1;
                for (let i = 0; i < this.Templates.length; i++) {
                    let d = this.DistanceAtBestAngle(points, this.Templates[i], -this.AngleRange, this.AngleRange, this.AnglePrecision);
                    if (d < b) { b = d; t = i; }
                }
                let score = 1.0 - (b / this.HalfDiagonal);
                return (t > -1 && score > 0.60) ? { Name: this.Templates[t].Name, Score: score } : { Name: 'none', Score: score };
            }
        }
        
        const recognizer = new GestureRecognizer();

        init();
        renderer.setAnimationLoop(animate);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a12);
            scene.fog = new THREE.Fog(0x0a0a12, 2, 10);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 3); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // --- Environment Setup ---
            const grid = new THREE.GridHelper(20, 40, 0x222244, 0x111122);
            scene.add(grid);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00ffff, 2, 10);
            pointLight.position.set(0, 1.2, 0);
            scene.add(pointLight);

            // --- Heart Stone & Health UI ---
            const stoneGeo = new THREE.IcosahedronGeometry(0.3, 1);
            const stoneMat = new THREE.MeshStandardMaterial({
                color: 0x00ffff, emissive: 0x008888, wireframe: true, transparent: true, opacity: 0.8
            });
            heartStone = new THREE.Mesh(stoneGeo, stoneMat);
            heartStone.position.set(0, 1.2, -0.5);
            scene.add(heartStone);

            const ringGeo = new THREE.TorusGeometry(0.45, 0.02, 8, 32);
            const ringMat = new THREE.MeshBasicMaterial({color: 0x00ff00});
            healthRing = new THREE.Mesh(ringGeo, ringMat);
            healthRing.rotation.x = Math.PI / 2;
            heartStone.add(healthRing); // Child of Heart Stone

            // --- Trail Setup ---
            trailGeo = new THREE.BufferGeometry();
            trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            trailGeo.setDrawRange(0, 0);
            const trailMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 3, transparent: true, opacity: 0.8 });
            trailLine = new THREE.Line(trailGeo, trailMat);
            scene.add(trailLine);

            setupHand(0); // Left
            setupHand(1); // Right

            window.addEventListener('resize', onWindowResize);
        }

        function damageHeartStone() {
            heartHealth -= 20;
            
            // Flash red
            heartStone.material.emissive.setHex(0xff0000);
            setTimeout(() => { heartStone.material.emissive.setHex(0x008888); }, 200);

            // Update Ring
            const scale = Math.max(0.1, heartHealth / 100);
            healthRing.scale.set(scale, scale, scale);

            if (heartHealth > 50) healthRing.material.color.setHex(0x00ff00);
            else if (heartHealth > 20) healthRing.material.color.setHex(0xffff00);
            else healthRing.material.color.setHex(0xff0000);

            if (heartHealth <= 0) {
                // System reset
                heartHealth = 100;
                healthRing.scale.set(1, 1, 1);
                healthRing.material.color.setHex(0x00ff00);
                
                // Wipe the board
                orbs.forEach(orb => scene.remove(orb));
                orbs = [];
                enemies.forEach(enemy => scene.remove(enemy));
                enemies = [];
            }
        }

        function createOrb(position) {
            // Ammo - Harmless energy waiting to be grabbed
            const colorHex = 0x00ffff;
            const geo = new THREE.SphereGeometry(0.06, 16, 16);
            const mat = new THREE.MeshStandardMaterial({
                color: colorHex, emissive: colorHex, emissiveIntensity: 0.8, roughness: 0.2, metalness: 0.8
            });
            const orb = new THREE.Mesh(geo, mat);
            orb.position.copy(position);
            
            orb.userData = { 
                baseY: position.y, 
                phase: Math.random() * Math.PI * 2, 
                heldBy: null
            };
            
            scene.add(orb);
            orbs.push(orb);
        }

        function createEnemy(position) {
            // Hostiles - Jagged and red, moving to destroy the artifact
            const geo = new THREE.IcosahedronGeometry(0.12, 0);
            const mat = new THREE.MeshStandardMaterial({
                color: 0xff0000, emissive: 0xaa0000, emissiveIntensity: 0.4, roughness: 0.6, flatShading: true
            });
            const enemy = new THREE.Mesh(geo, mat);
            enemy.position.copy(position);
            
            enemy.userData = { 
                phase: Math.random() * Math.PI * 2, 
                state: 'homing', 
                velocity: new THREE.Vector3()
            };
            
            scene.add(enemy);
            enemies.push(enemy);
        }

        function setupHand(index) {
            const hand = renderer.xr.getHand(index);
            scene.add(hand);

            hand.userData.jointMeshes = {};
            hand.userData.isHolding = false;
            hand.userData.handedness = index === 0 ? 'left' : 'right';

            hand.addEventListener('connected', (event) => { hand.userData.xrInputSource = event.data; });
            hands[index] = hand;
        }

        function applyEMA(jointName, currentPos) {
            if (!smoothedJoints.has(jointName)) {
                smoothedJoints.set(jointName, currentPos.clone());
                return currentPos.clone();
            }
            const previousPos = smoothedJoints.get(jointName);
            const smoothed = new THREE.Vector3(
                (currentPos.x * EMA_ALPHA) + (previousPos.x * (1 - EMA_ALPHA)),
                (currentPos.y * EMA_ALPHA) + (currentPos.y * (1 - EMA_ALPHA)),
                (currentPos.z * EMA_ALPHA) + (currentPos.z * (1 - EMA_ALPHA))
            );
            smoothedJoints.set(jointName, smoothed);
            return smoothed;
        }

        function isHandOpen(hand) {
            if (!hand.joints || !hand.joints['wrist'] || !hand.joints['index-finger-tip']) return false;
            const dist = hand.joints['wrist'].position.distanceTo(hand.joints['index-finger-tip'].position);
            return dist > 0.10; 
        }

        function isHandClosed(hand) {
            if (!hand.joints || !hand.joints['wrist'] || !hand.joints['index-finger-tip']) return false;
            const dist = hand.joints['wrist'].position.distanceTo(hand.joints['index-finger-tip'].position);
            return dist < 0.07; 
        }

        function isPinching(hand) {
            if (!hand.joints || !hand.joints['thumb-tip'] || !hand.joints['index-finger-tip']) return false;
            const dist = hand.joints['thumb-tip'].position.distanceTo(hand.joints['index-finger-tip'].position);
            return dist < PINCH_THRESH; 
        }

        function fireSpell(type, origin) {
            if (type === 'line') {
                // BEAM WEAPON: Raycast forward from camera direction
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
                
                // Visual Effect - rotated -Math.PI/2 to shoot away from the player
                const geo = new THREE.CylinderGeometry(0.01, 0.01, 10);
                geo.translate(0, 5, 0); 
                geo.rotateX(-Math.PI / 2); 
                const mat = new THREE.MeshBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.8});
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(origin);
                mesh.quaternion.copy(camera.quaternion); 
                scene.add(mesh);
                
                // Collision Logic against Enemies
                const raycaster = new THREE.Raycaster(origin, forward);
                const intersects = raycaster.intersectObjects(enemies);
                
                if (intersects.length > 0) {
                    const hitEnemy = intersects[0].object;
                    const index = enemies.indexOf(hitEnemy);
                    if(index > -1) {
                        scene.remove(hitEnemy);
                        enemies.splice(index, 1);
                    }
                }

                setTimeout(() => scene.remove(mesh), 200);

            } else if (type === 'triangle') {
                // KINETIC REPULSE: Massively Buffed to launch enemies away
                const REPULSE_RADIUS = 5.0; // Increased radius
                const PUSH_FORCE = 15.0; // Massive outward force
                
                // Visual Effect
                const geo = new THREE.IcosahedronGeometry(0.1, 1);
                const mat = new THREE.MeshBasicMaterial({color: 0xffaa00, wireframe: true, transparent: true, opacity: 0.8});
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(origin);
                scene.add(mesh);
                
                const expInt = setInterval(() => {
                    mesh.scale.multiplyScalar(1.3);
                    mat.opacity -= 0.08;
                    if(mat.opacity <= 0) { clearInterval(expInt); scene.remove(mesh); }
                }, 30);

                // Collision Logic against Enemies
                enemies.forEach(enemy => {
                    if (enemy.position.distanceTo(origin) < REPULSE_RADIUS) {
                        enemy.userData.state = 'repulsed';
                        const pushDir = new THREE.Vector3().subVectors(enemy.position, origin).normalize();
                        enemy.userData.velocity.copy(pushDir.multiplyScalar(PUSH_FORCE)); 
                    }
                });
            } else if (type === 'cross' || type === 'x') {
                // CROSS BARRAGE: Fires 4 diverging beams in an X pattern relative to the camera
                const divergence = Math.PI / 10; // Angle of spread
                const angles = [
                    new THREE.Euler(divergence, divergence, 0),
                    new THREE.Euler(divergence, -divergence, 0),
                    new THREE.Euler(-divergence, divergence, 0),
                    new THREE.Euler(-divergence, -divergence, 0)
                ];

                angles.forEach(euler => {
                    const directionQuat = camera.quaternion.clone().multiply(new THREE.Quaternion().setFromEuler(euler));
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(directionQuat).normalize();
                    
                    // Visual Effect
                    const geo = new THREE.CylinderGeometry(0.015, 0.015, 10);
                    geo.translate(0, 5, 0); 
                    geo.rotateX(-Math.PI / 2); 
                    const mat = new THREE.MeshBasicMaterial({color: 0x00ffff, transparent: true, opacity: 0.8});
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(origin);
                    mesh.quaternion.copy(directionQuat);
                    scene.add(mesh);
                    
                    // Collision Logic against Enemies
                    const raycaster = new THREE.Raycaster(origin, forward);
                    const intersects = raycaster.intersectObjects(enemies);
                    
                    if (intersects.length > 0) {
                        const hitEnemy = intersects[0].object;
                        const index = enemies.indexOf(hitEnemy);
                        if(index > -1) {
                            scene.remove(hitEnemy);
                            enemies.splice(index, 1);
                        }
                    }
                    setTimeout(() => scene.remove(mesh), 300);
                });
            }
        }

        function processGesture() {
            if (drawPoints3D.length < 10) return;

            const points2D = drawPoints3D.map(pt3d => {
                const vec = pt3d.clone().project(camera);
                return new Point((vec.x + 1) * 500, (1 - vec.y) * 500); 
            });

            const result = recognizer.Recognize(points2D);
            console.log("Casted: ", result.Name, "Score: ", result.Score);

            // Treat 'x' and 'cross' as the same weapon trigger
            const finalSpell = (result.Name === 'x') ? 'cross' : result.Name;

            if (result.Name !== 'none') {
                const heldOrbIndex = orbs.findIndex(o => o.userData.heldBy === activeCastingHand);
                if (heldOrbIndex > -1) {
                    const origin = orbs[heldOrbIndex].position.clone();
                    scene.remove(orbs[heldOrbIndex]);
                    orbs.splice(heldOrbIndex, 1);
                    
                    fireSpell(finalSpell, origin);
                    
                    const handIdx = activeCastingHand === 'left' ? 0 : 1;
                    hands[handIdx].userData.isHolding = false;
                }
            }
        }

        function updateHands(timeDelta) {
            hands.forEach(hand => {
                if (!hand || !hand.joints) return;

                const wristSpace = hand.joints['wrist'];
                if (!wristSpace || !wristSpace.position) return; 

                Object.keys(hand.joints).forEach(jointName => {
                    const joint = hand.joints[jointName];
                    if (!joint.position) return;

                    if (!hand.userData.jointMeshes[jointName]) {
                        const geo = new THREE.SphereGeometry(jointName.includes('tip') ? 0.012 : 0.008, 8, 8);
                        const mat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.3 });
                        const mesh = new THREE.Mesh(geo, mat);
                        scene.add(mesh);
                        hand.userData.jointMeshes[jointName] = mesh;
                    }

                    const mesh = hand.userData.jointMeshes[jointName];
                    const uniqueJointId = `${hand.userData.handedness}_${jointName}`;
                    const smoothedPos = applyEMA(uniqueJointId, joint.position);
                    mesh.position.copy(smoothedPos);
                    mesh.quaternion.copy(joint.quaternion);
                });

                const isOp = isHandOpen(hand);
                const isClosed = isHandClosed(hand);
                const pinching = isPinching(hand);
                const wristPos = hand.joints['wrist'].position;

                if (hand.userData.isHolding && isClosed && !isDrawing) {
                    orbs.forEach(orb => {
                        if (orb.userData.heldBy === hand.userData.handedness) {
                            orb.userData.heldBy = null; 
                            orb.userData.baseY = orb.position.y; // Drops back to idle hover
                        }
                    });
                    hand.userData.isHolding = false;
                }

                if (!hand.userData.isHolding && isOp) {
                    for (let i = 0; i < orbs.length; i++) {
                        const orb = orbs[i];
                        if (orb.userData.heldBy !== null) continue; // Skip if held
                        
                        if (wristPos.distanceTo(orb.position) < CATCH_RADIUS) {
                            orb.userData.heldBy = hand.userData.handedness;
                            hand.userData.isHolding = true;
                            break; 
                        }
                    }
                }

                if (hand.userData.isHolding) {
                    if (pinching) {
                        if (!isDrawing) {
                            isDrawing = true;
                            currentTrailCount = 0;
                            drawPoints3D = [];
                            activeCastingHand = hand.userData.handedness;
                        }
                        
                        if (currentTrailCount < MAX_TRAIL_POINTS && activeCastingHand === hand.userData.handedness) {
                            const pinchPoint = new THREE.Vector3().addVectors(
                                hand.joints['thumb-tip'].position, 
                                hand.joints['index-finger-tip'].position
                            ).multiplyScalar(0.5);

                            drawPoints3D.push(pinchPoint.clone());
                            trailPositions[currentTrailCount * 3] = pinchPoint.x;
                            trailPositions[currentTrailCount * 3 + 1] = pinchPoint.y;
                            trailPositions[currentTrailCount * 3 + 2] = pinchPoint.z;
                            currentTrailCount++;
                            trailGeo.setDrawRange(0, currentTrailCount);
                            trailGeo.attributes.position.needsUpdate = true;
                        }
                    } else if (isDrawing && activeCastingHand === hand.userData.handedness) {
                        isDrawing = false;
                        processGesture();
                        trailGeo.setDrawRange(0, 0); 
                        currentTrailCount = 0;
                    }
                }
            });
        }

        function updateEntities(timeDelta, timeSeconds) {
            // Spawn Enemy Logic (180 degrees in front of the player)
            enemySpawnTimer -= timeDelta;
            if (enemySpawnTimer <= 0) {
                enemySpawnTimer = ENEMY_SPAWN_RATE;
                // An angle between PI and 2*PI ensures they only spawn on the far side 
                // of the Heart Stone, never behind you.
                const angle = Math.PI + (Math.random() * Math.PI); 
                const radius = 5; // Spawn 5 meters out
                const yPos = 1.2 + (Math.random() * 0.8 - 0.4); 
                createEnemy(new THREE.Vector3(Math.cos(angle) * radius, yPos, -0.5 + Math.sin(angle) * radius));
            }

            // Spawn Ammo Logic (Tightly clustered in front of player)
            orbSpawnTimer -= timeDelta;
            if (orbSpawnTimer <= 0 && orbs.length < 5) {
                orbSpawnTimer = ORB_SPAWN_RATE;
                // Spawning biased forward
                const angle = Math.PI + (Math.random() * Math.PI); 
                const radius = 0.3 + Math.random() * 0.2; // 0.3m to 0.5m right in front of you
                const yPos = 1.0 + Math.random() * 0.4; // Waist/Chest height
                
                // Position relative to the camera to ensure they are easily reachable
                createOrb(new THREE.Vector3(
                    camera.position.x + Math.cos(angle) * radius, 
                    yPos, 
                    camera.position.z + Math.sin(angle) * radius
                ));
            }

            const heartPos = heartStone.position;

            // Process Hostiles
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];

                if (enemy.userData.state === 'homing') {
                    // Move relentlessly toward Heart Stone
                    const moveDir = new THREE.Vector3().subVectors(heartPos, enemy.position).normalize();
                    const SPEED = 0.5; 
                    enemy.position.add(moveDir.multiplyScalar(SPEED * timeDelta));
                    enemy.position.y += Math.sin(timeSeconds * 4 + enemy.userData.phase) * 0.003;
                    
                    // Rotate for jagged effect
                    enemy.rotation.x += 0.02;
                    enemy.rotation.y += 0.03;

                    // Collision with Heart Stone
                    if (enemy.position.distanceTo(heartPos) < 0.4) {
                        damageHeartStone();
                        scene.remove(enemy);
                        enemies.splice(i, 1);
                    }
                } else if (enemy.userData.state === 'repulsed') {
                    // Apply heavy physics velocity
                    enemy.position.add(enemy.userData.velocity.clone().multiplyScalar(timeDelta));
                    enemy.userData.velocity.multiplyScalar(0.92); // Friction
                    if (enemy.userData.velocity.length() < 0.2) {
                        enemy.userData.state = 'homing';
                    }
                }
            }

            // Process Ammo Orbs
            orbs.forEach(orb => {
                if (orb.userData.heldBy) {
                    const handIndex = orb.userData.heldBy === 'left' ? 0 : 1;
                    const hand = hands[handIndex];
                    if (hand && hand.joints && hand.joints['wrist']) {
                        orb.position.lerp(hand.joints['wrist'].position, 0.2); 
                    }
                } else {
                    orb.position.y = orb.userData.baseY + Math.sin(timeSeconds * 2 + orb.userData.phase) * 0.05;
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        let lastTime = 0;
        function animate(time, frame) {
            const timeSeconds = time * 0.001;
            const timeDelta = Math.min(timeSeconds - lastTime, 0.1); // Cap delta to prevent huge jumps
            lastTime = timeSeconds;
            
            heartStone.rotation.y += 0.01;
            heartStone.rotation.x += 0.005;

            if (renderer.xr.isPresenting) {
                updateHands(timeDelta);
            }

            updateEntities(timeDelta, timeSeconds);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
