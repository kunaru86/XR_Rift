        // --- $1 Recognizer Implementation ---
        class Point { constructor(x, y) { this.x = x; this.y = y; } }
        class GestureRecognizer {
            constructor() {
                this.NumPoints = 64;
                this.SquareSize = 250.0;
                this.HalfDiagonal = 0.5 * Math.sqrt(250.0 * 250.0 + 250.0 * 250.0);
                this.AngleRange = this.deg2Rad(45.0);
                this.AnglePrecision = this.deg2Rad(2.0);
                this.Templates = [];
                this.setupTemplates();
            }
            deg2Rad(d) { return (d * Math.PI / 180.0); }
            Distance(p1, p2) { return Math.sqrt((p2.x - p1.x)*(p2.x - p1.x) + (p2.y - p1.y)*(p2.y - p1.y)); }
            PathLength(points) { let d = 0; for(let i=1; i<points.length; i++) d += this.Distance(points[i-1], points[i]); return d; }
            Resample(points, n) {
                let I = this.PathLength(points) / (n - 1);
                let D = 0.0;
                let newpoints = [points[0]];
                for (let i = 1; i < points.length; i++) {
                    let d = this.Distance(points[i-1], points[i]);
                    if ((D + d) >= I) {
                        let qx = points[i-1].x + ((I - D) / d) * (points[i].x - points[i-1].x);
                        let qy = points[i-1].y + ((I - D) / d) * (points[i].y - points[i-1].y);
                        let q = new Point(qx, qy);
                        newpoints.push(q);
                        points.splice(i, 0, q);
                        D = 0.0;
                    } else D += d;
                }
                if (newpoints.length == n - 1) newpoints.push(points[points.length - 1]);
                return newpoints;
            }
            Centroid(points) {
                let x = 0.0, y = 0.0;
                for (let i = 0; i < points.length; i++) { x += points[i].x; y += points[i].y; }
                return new Point(x / points.length, y / points.length);
            }
            RotateBy(points, radians) {
                let c = this.Centroid(points);
                let cos = Math.cos(radians), sin = Math.sin(radians);
                let newpoints = [];
                for (let i = 0; i < points.length; i++) {
                    let qx = (points[i].x - c.x) * cos - (points[i].y - c.y) * sin + c.x;
                    let qy = (points[i].x - c.x) * sin + (points[i].y - c.y) * cos + c.y;
                    newpoints.push(new Point(qx, qy));
                }
                return newpoints;
            }
            ScaleTo(points, size) {
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                for (let i = 0; i < points.length; i++) {
                    minX = Math.min(minX, points[i].x); maxX = Math.max(maxX, points[i].x);
                    minY = Math.min(minY, points[i].y); maxY = Math.max(maxY, points[i].y);
                }
                let newpoints = [];
                for (let i = 0; i < points.length; i++) {
                    let qx = points[i].x * (size / Math.max(maxX - minX, 1.0)); 
                    let qy = points[i].y * (size / Math.max(maxY - minY, 1.0));
                    newpoints.push(new Point(qx, qy));
                }
                return newpoints;
            }
            TranslateTo(points, pt) {
                let c = this.Centroid(points);
                let newpoints = [];
                for (let i = 0; i < points.length; i++) { newpoints.push(new Point(points[i].x + pt.x - c.x, points[i].y + pt.y - c.y)); }
                return newpoints;
            }
            DistanceAtBestAngle(points, T, a, b, threshold) {
                let x1 = 0.38197 * a + 0.61803 * b;
                let f1 = this.DistanceAtAngle(points, T, x1);
                let x2 = 0.61803 * a + 0.38197 * b;
                let f2 = this.DistanceAtAngle(points, T, x2);
                while (Math.abs(b - a) > threshold) {
                    if (f1 < f2) { b = x2; x2 = x1; f2 = f1; x1 = 0.38197 * a + 0.61803 * b; f1 = this.DistanceAtAngle(points, T, x1); } 
                    else { a = x1; x1 = x2; f1 = f2; x2 = 0.61803 * a + 0.38197 * b; f2 = this.DistanceAtAngle(points, T, x2); }
                }
                return Math.min(f1, f2);
            }
            DistanceAtAngle(points, T, radians) {
                let newpoints = this.RotateBy(points, radians);
                let d = 0;
                for (let i = 0; i < points.length; i++) d += this.Distance(newpoints[i], T.Points[i]);
                return d / points.length;
            }
            Normalize(points) {
                points = this.Resample(points, this.NumPoints);
                let radians = Math.atan2(points[0].y - this.Centroid(points).y, points[0].x - this.Centroid(points).x);
                points = this.RotateBy(points, -radians);
                points = this.ScaleTo(points, this.SquareSize);
                points = this.TranslateTo(points, new Point(0, 0));
                return points;
            }
            setupTemplates() {
                const addT = (name, pts) => this.Templates.push({Name: name, Points: this.Normalize(pts)});
                addT('line', [new Point(0,0), new Point(100,0)]);
                addT('triangle', [new Point(50,10), new Point(10,90), new Point(90,90), new Point(50,10)]);
                addT('cross', [new Point(50,10), new Point(50,90), new Point(50,50), new Point(10,50), new Point(90,50)]);
                addT('x', [new Point(10,10), new Point(90,90), new Point(90,10), new Point(10,90)]);
            }
            Recognize(points) {
                if(points.length < 10) return { Name: 'none', Score: 0 };
                points = this.Normalize(points);
                let b = Infinity;
                let t = -1;
                for (let i = 0; i < this.Templates.length; i++) {
                    let d = this.DistanceAtBestAngle(points, this.Templates[i], -this.AngleRange, this.AngleRange, this.AnglePrecision);
                    if (d < b) { b = d; t = i; }
                }
                let score = 1.0 - (b / this.HalfDiagonal);
                return (t > -1 && score > 0.60) ? { Name: this.Templates[t].Name, Score: score } : { Name: 'none', Score: score };
            }
        }
        
        const recognizer = new GestureRecognizer();

        init();
        renderer.setAnimationLoop(animate);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020408);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 3);

            renderer.setSize(window.innerWidth, window.innerHeight);

            document.body.appendChild(VRButton.createButton(renderer));

            buildSimulationEnvironment();

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambientLight);

            pointLight.position.set(0, 1.2, 0);
            scene.add(pointLight);

            const stoneGeo = new THREE.IcosahedronGeometry(0.3, 1);

                color: 0x00ffff, emissive: 0x008888, wireframe: true, transparent: true, opacity: 0.8
            });

            heartStone.position.set(0, 1.2, -0.5);
            scene.add(heartStone);

                const rMat = new THREE.MeshBasicMaterial({color: 0x00aaff, side: THREE.DoubleSide, transparent: true, opacity: 0.7});

                reticle.visible = false;
                scene.add(reticle);
                lockReticles.push(reticle);

            hudCanvas.height = 512;

            const hudGeo = new THREE.PlaneGeometry(0.35, 0.35);
            const hudMat = new THREE.MeshBasicMaterial({ map: hudTexture, transparent: true, opacity: 0.95, side: THREE.DoubleSide, depthTest: false }); 
            hudMesh = new THREE.Mesh(hudGeo, hudMat);

        function buildSimulationEnvironment() {
            const floorGeo = new THREE.PlaneGeometry(100, 100);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x050811, roughness: 0.9, metalness: 0.2 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const grid = new THREE.GridHelper(100, 100, 0x00aaff, 0x002244);
            grid.position.y = 0.01; 
            scene.add(grid);

            const pedGeo = new THREE.CylinderGeometry(0.8, 1.0, 0.5, 6);
            const pedMat = new THREE.MeshStandardMaterial({ color: 0x0a101a, metalness: 0.8, roughness: 0.3 });
            const pedestal = new THREE.Mesh(pedGeo, pedMat);
            pedestal.position.set(0, 0.25, -0.5); 
            scene.add(pedestal);

            const pedEdges = new THREE.EdgesGeometry(pedGeo);
            const pedLine = new THREE.LineSegments(pedEdges, new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 }));
            pedestal.add(pedLine);

            const cityGroup = new THREE.Group();
            const numTowers = 45;
            for(let i=0; i<numTowers; i++) {
                const h = 2 + Math.random() * 15;
                const w = 1 + Math.random() * 4;
                const d = 1 + Math.random() * 4;
                const bGeo = new THREE.BoxGeometry(w, h, d);
                const bMat = new THREE.MeshStandardMaterial({ color: 0x020408, metalness: 0.9, roughness: 0.1 });
                const bMesh = new THREE.Mesh(bGeo, bMat);
                const angle = Math.random() * Math.PI * 2;
                const radius = 12 + Math.random() * 18; 
                bMesh.position.set(Math.cos(angle) * radius, h/2, Math.sin(angle) * radius);
                const edges = new THREE.EdgesGeometry(bGeo);
                const edgeColor = Math.random() > 0.5 ? 0x00aaff : 0xaa00ff;
                const lineMat = new THREE.LineBasicMaterial({ color: edgeColor, transparent: true, opacity: 0.4 });
                const line = new THREE.LineSegments(edges, lineMat);
                bMesh.add(line);
                cityGroup.add(bMesh);
            }
            scene.add(cityGroup);
        }

        // --- Visual Effects System ---
        function spawnParticleExplosion(position, color, count = 12) {
            for (let i = 0; i < count; i++) {
                const geo = new THREE.IcosahedronGeometry(0.02 + Math.random() * 0.04, 0);
                const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1.0 });
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(position);
                
                p.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.1,
                        (Math.random() - 0.5) * 0.1,
                        (Math.random() - 0.5) * 0.1
                    ),
                    life: 1.0
                };
                scene.add(p);
                particles.push(p);
            }
        }

        function createMuzzleFlash(position, color, scale = 1.0) {
            const geo = new THREE.SphereGeometry(0.05, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
            const flash = new THREE.Mesh(geo, mat);
            flash.position.copy(position);
            flash.scale.set(0.1, 0.1, 0.1);
            scene.add(flash);

            const start = Date.now();
            const duration = 200;
            const animateFlash = () => {
                const elapsed = Date.now() - start;
                const progress = elapsed / duration;
                if (progress < 1.0) {
                    const s = 0.1 + progress * 5 * scale;
                    flash.scale.set(s, s, s);
                    flash.material.opacity = 0.8 * (1 - progress);
                    requestAnimationFrame(animateFlash);
                } else {
                    scene.remove(flash);
                }
            };
            animateFlash();
        }

        function handleEnemyKill() {
            enemiesKilled++;
            updateStatsUI();
        }

        function updateStatsUI() {
            const h = (hands[0]?.userData.heldOrbs.length > hands[1]?.userData.heldOrbs.length) ? hands[0] : (hands[1] || hands[0]);
            if (!h) return;
            const total = h.userData.heldOrbs.length;
            const b = h.userData.heldOrbs.filter(o => o.userData.spellType === 'line').length;
            const o = h.userData.heldOrbs.filter(o => o.userData.spellType === 'triangle').length;
            const p = h.userData.heldOrbs.filter(o => o.userData.spellType === 'cross').length;
            document.getElementById('ui-wave').innerText = `WAVE: ${currentWave}`;
            document.getElementById('ui-cap').innerText = `CAP: ${total}/${MAX_HELD_ORBS}`;
            document.getElementById('ui-b').innerText = `B:${b}`;
            document.getElementById('ui-o').innerText = `O:${o}`;
            document.getElementById('ui-p').innerText = `P:${p}`;
            document.getElementById('ui-kills').innerText = `KIA: ${enemiesKilled}`;
        }

            hudCtx.fillRect(10, 494, cL, cT); hudCtx.fillRect(10, 502 - cL, cT, cL);
            hudCtx.fillRect(502 - cL, 494, cL, cT); hudCtx.fillRect(494, 502 - cL, cT, cL);

            hudCtx.fillStyle = '#00ffff';
            hudCtx.textAlign = 'center';
            hudCtx.fillText('TACTICAL OVERVIEW', 256, 55);

            hudCtx.moveTo(30, 75);
            hudCtx.lineTo(482, 75);

            hudCtx.stroke();
            hudCtx.font = 'bold 24px Courier New';
            hudCtx.textAlign = 'left';
            hudCtx.fillStyle = '#ffffff';
            const mins = Math.floor(timeSeconds / 60);
            const secs = Math.floor(timeSeconds % 60).toString().padStart(2, '0');
            hudCtx.fillText(`SYS. UPTIME  : ${mins}:${secs}`, 40, 115);
            hudCtx.fillText(`THREAT LEVEL : WAVE ${currentWave}`, 40, 155);
            hudCtx.fillText(`TARGETS KIA  : ${enemiesKilled}`, 40, 195);
            hudCtx.beginPath();
            hudCtx.moveTo(30, 215);
            hudCtx.lineTo(482, 215);

            const b = activeHand?.userData.heldOrbs.filter(o => o.userData.spellType === 'line').length || 0;
            const o = activeHand?.userData.heldOrbs.filter(o => o.userData.spellType === 'triangle').length || 0;

            hudCtx.fillStyle = '#aaaaaa';
            hudCtx.fillText(`MAGAZINE STATUS [${total}/${MAX_HELD_ORBS}]`, 40, 255);
            hudCtx.font = '22px Courier New';
            hudCtx.fillStyle = '#00aaff'; hudCtx.fillText(`[BLUE]   LINE : ${b}`, 50, 295);
            hudCtx.fillStyle = '#ffaa00'; hudCtx.fillText(`[ORANGE] TRI  : ${o}`, 50, 325);
            hudCtx.fillStyle = '#aa00ff'; hudCtx.fillText(`[PURPLE] CRS  : ${p}`, 50, 355);
            hudCtx.beginPath();
            hudCtx.moveTo(30, 375);
            hudCtx.lineTo(482, 375);
            hudCtx.stroke();
            hudCtx.fillStyle = '#ffffff';
            hudCtx.fillText(`COMBAT PROTOCOLS:`, 40, 410);
            hudCtx.font = '18px Courier New';
            hudCtx.fillStyle = '#00aaff'; hudCtx.fillText(`> LINE : Beam / Unibeam (5 Blue)`, 50, 440);
            hudCtx.fillStyle = '#ffaa00'; hudCtx.fillText(`> TRI  : Kinetic Repulse`, 50, 465);
            hudCtx.fillStyle = '#aa00ff'; hudCtx.fillText(`> CRS/X: Tracking Swarm`, 50, 490);
            hudTexture.needsUpdate = true;
        }

        function damageHeartStone(amount) {
            heartHealth -= amount;
            heartStone.material.emissive.setHex(0xff0000);
            setTimeout(() => { heartStone.material.emissive.setHex(0x008888); }, 200);
            const scale = Math.max(0.1, heartHealth / 100);
            healthRing.scale.set(scale, scale, scale);
            if (heartHealth > 50) healthRing.material.color.setHex(0x00ff00);
            else if (heartHealth > 20) healthRing.material.color.setHex(0xffff00);
            else healthRing.material.color.setHex(0xff0000);
            if (heartHealth <= 0) {
                heartHealth = 100;
                enemiesKilled = 0;
                currentWave = 1;
                enemiesTotalThisWave = 10;
                enemiesSpawnedThisWave = 0;
                waveState = 'spawning';
                enemySpawnTimer = 0;
                const ann = document.getElementById('wave-announce');
                ann.innerText = "SYSTEM REBOOT - WAVE 1";
                ann.style.opacity = 1;
                setTimeout(() => { ann.style.opacity = 0; }, 3000);
                healthRing.scale.set(1, 1, 1);
                healthRing.material.color.setHex(0x00ff00);
                orbs.forEach(orb => scene.remove(orb)); 
                orbs = [];
                enemies.forEach(enemy => scene.remove(enemy));
                enemies = [];
                hands.forEach(h => { if(h) h.userData.heldOrbs = []; });
                updateStatsUI();
            }
        }

        function damageEnemy(enemy, amount, killColor = 0xff0000) {
            enemy.userData.hp -= amount;
            const originalEmissive = enemy.material.emissive.getHex();
            enemy.material.emissive.setHex(0xffffff);
            setTimeout(() => { if (enemies.includes(enemy)) enemy.material.emissive.setHex(originalEmissive); }, 100);
            if (enemy.userData.hp <= 0) {
                spawnParticleExplosion(enemy.position, killColor, 20);
                scene.remove(enemy);
                const index = enemies.indexOf(enemy);
                if(index > -1) enemies.splice(index, 1);
                handleEnemyKill();
            }
        }

        function createOrb(position) {
            const typeInfo = SPELL_TYPES[Math.floor(Math.random() * SPELL_TYPES.length)];
            const orbGroup = new THREE.Group();
            orbGroup.position.copy(position);
            const shellGeo = new THREE.SphereGeometry(0.06, 16, 16);
            const shellMat = new THREE.MeshStandardMaterial({
                color: typeInfo.color, transparent: true, opacity: 0.3, roughness: 0.1, metalness: 0.8 
            });
            const shell = new THREE.Mesh(shellGeo, shellMat);
            orbGroup.add(shell);
            const innerMat = new THREE.MeshStandardMaterial({
                color: typeInfo.color, emissive: typeInfo.color, emissiveIntensity: 2.0, roughness: 0.5
            });
            let innerMesh;
            if (typeInfo.type === 'line') {
                const geo = new THREE.CylinderGeometry(0.01, 0.01, 0.08, 8);
                innerMesh = new THREE.Mesh(geo, innerMat);
            } else if (typeInfo.type === 'triangle') {
                const geo = new THREE.CylinderGeometry(0.04, 0.04, 0.015, 3);
                innerMesh = new THREE.Mesh(geo, innerMat);
                innerMesh.rotation.x = Math.PI / 2;
            } else if (typeInfo.type === 'cross') {
                innerMesh = new THREE.Group();
                const geo = new THREE.CylinderGeometry(0.01, 0.01, 0.08, 8);
                const bar1 = new THREE.Mesh(geo, innerMat);
                const bar2 = new THREE.Mesh(geo, innerMat);
                bar2.rotation.z = Math.PI / 2;
                innerMesh.add(bar1); innerMesh.add(bar2);
            }
            orbGroup.add(innerMesh);
            orbGroup.userData = { 
                baseY: position.y, phase: Math.random() * Math.PI * 2, heldBy: null, state: 'idle',
                spellType: typeInfo.type, innerSymbol: innerMesh 
            };
            scene.add(orbGroup);
            orbs.push(orbGroup);
        }

        function createEnemy(position, type, waveLevel) {
            let scale, hp, speed, color, emissive;
            if (type === 'brute') {
                scale = 1.8; hp = 3; color = 0x880000; emissive = 0x550000;
                speed = 0.15 + (waveLevel * 0.02); 
            } else { 
                scale = 1.0; hp = 1; color = 0xff0000; emissive = 0xaa0000;
                speed = 0.30 + (waveLevel * 0.05); 
            }
            const geo = new THREE.IcosahedronGeometry(0.12 * scale, 0);
            const mat = new THREE.MeshStandardMaterial({
                color: color, emissive: emissive, emissiveIntensity: 0.4, roughness: 0.6, flatShading: true
            });
            const enemy = new THREE.Mesh(geo, mat);
            enemy.position.copy(position);
            enemy.userData = { 
                type: type, hp: hp, baseSpeed: speed, phase: Math.random() * Math.PI * 2, 
                state: 'homing', velocity: new THREE.Vector3() 
            };
            scene.add(enemy);
            enemies.push(enemy);

            // Spawning visual flash
            createMuzzleFlash(position, 0xffaa00, 2.0);
        }

        function setupHand(index) {
            const hand = renderer.xr.getHand(index);
            scene.add(hand);
            hand.userData.jointMeshes = {};
            hand.userData.heldOrbs = []; 
            hand.userData.handedness = index === 0 ? 'left' : 'right';
            const gauntletGeo = new THREE.CylinderGeometry(0.04, 0.045, 0.12, 8);
            gauntletGeo.rotateX(Math.PI / 2); 
            const gauntletMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.3 });
            const gauntlet = new THREE.Mesh(gauntletGeo, gauntletMat);
            gauntlet.visible = false; 
            scene.add(gauntlet);
            hand.userData.gauntletMesh = gauntlet;
            hand.addEventListener('connected', (event) => { hand.userData.xrInputSource = event.data; });
            hands[index] = hand;
        }

        function applyEMA(jointName, currentPos) {
            if (!smoothedJoints.has(jointName)) { smoothedJoints.set(jointName, currentPos.clone()); return currentPos.clone(); }
            const previousPos = smoothedJoints.get(jointName);
            const smoothed = new THREE.Vector3(
                (currentPos.x * EMA_ALPHA) + (previousPos.x * (1 - EMA_ALPHA)),
                (currentPos.y * EMA_ALPHA) + (previousPos.y * (1 - EMA_ALPHA)),
                (currentPos.z * EMA_ALPHA) + (previousPos.z * (1 - EMA_ALPHA))
            );
            smoothedJoints.set(jointName, smoothed);
            return smoothed;
        }

        function isHandOpen(hand) {
            if (!hand.joints || !hand.joints['wrist'] || !hand.joints['index-finger-tip']) return false;
            return hand.joints['wrist'].position.distanceTo(hand.joints['index-finger-tip'].position) > 0.10; 
        }

        function isHandClosed(hand) {
            if (!hand.joints || !hand.joints['wrist'] || !hand.joints['index-finger-tip']) return false;
            return hand.joints['wrist'].position.distanceTo(hand.joints['index-finger-tip'].position) < 0.07; 
        }

        function isPinching(hand) {
            if (!hand.joints || !hand.joints['thumb-tip'] || !hand.joints['index-finger-tip']) return false;
            return hand.joints['thumb-tip'].position.distanceTo(hand.joints['index-finger-tip'].position) < PINCH_THRESH; 
        }

        function isShaka(hand) {
            if (!hand.joints || !hand.joints['thumb-tip'] || !hand.joints['pinky-finger-tip'] || !hand.joints['index-finger-tip'] || !hand.joints['wrist']) return false;
            const thumbTip = hand.joints['thumb-tip'].position;
            const pinkyTip = hand.joints['pinky-finger-tip'].position;
            const indexTip = hand.joints['index-finger-tip'].position;
            const wrist = hand.joints['wrist'].position;
            const spread = thumbTip.distanceTo(pinkyTip);
            const indexCurl = indexTip.distanceTo(wrist);
            return spread > 0.12 && indexCurl < 0.09; 
        }

        function updateTargeting() {
            lockedEnemies = [];
            const blueL = hands[0]?.userData.heldOrbs.filter(o => o.userData.spellType === 'line').length || 0;
            const blueR = hands[1]?.userData.heldOrbs.filter(o => o.userData.spellType === 'line').length || 0;
            const currentCharge = Math.max(blueL, blueR);
            if (currentCharge > 0 && currentCharge < MAX_HELD_ORBS && enemies.length > 0) {
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                const candidates = [];
                enemies.forEach(enemy => {
                    const dirToEnemy = new THREE.Vector3().subVectors(enemy.position, camera.position).normalize();
                    const dot = forward.dot(dirToEnemy);
                    if (dot > 0.5) candidates.push({ enemy, dot }); 
                });
                candidates.sort((a, b) => b.dot - a.dot);
                for (let i = 0; i < Math.min(currentCharge, candidates.length); i++) {
                    lockedEnemies.push(candidates[i].enemy);
                }
            } else if (currentCharge === MAX_HELD_ORBS) {
                lockedEnemies = [];
            }
            for (let i = 0; i < lockReticles.length; i++) {
                if (i < lockedEnemies.length) {
                    lockReticles[i].visible = true; lockReticles[i].position.copy(lockedEnemies[i].position);
                    lockReticles[i].lookAt(camera.position); lockReticles[i].rotation.z += 0.05; 
                } else { lockReticles[i].visible = false; }
            }
        }

        function fireSpell(type, origin, powerLevel) {
            // Weapon firing feedback
            createMuzzleFlash(origin, (type === 'line' ? 0x00ffff : (type === 'triangle' ? 0xffaa00 : 0xaa00ff)), 1.5 * (powerLevel/3));

            if (type === 'line') {
                if (powerLevel === MAX_HELD_ORBS) {
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
                    const BEAM_LENGTH = 40;
                    const startPos = origin.clone().add(forward.multiplyScalar(0.6));
                    const geo = new THREE.CylinderGeometry(0.5, 0.5, BEAM_LENGTH, 16);
                    geo.translate(0, BEAM_LENGTH/2, 0); geo.rotateX(-Math.PI / 2); 
                    const mat = new THREE.MeshBasicMaterial({color: 0x00ffff, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending});
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(startPos); mesh.quaternion.copy(camera.quaternion); 
                    scene.add(mesh);
                    const endPoint = startPos.clone().add(forward.multiplyScalar(BEAM_LENGTH));
                    const rayLine = new THREE.Line3(startPos, endPoint);
                    const closestPoint = new THREE.Vector3();
                    for(let i = enemies.length - 1; i >= 0; i--) {
                        const enemy = enemies[i];
                        rayLine.closestPointToPoint(enemy.position, true, closestPoint);
                        if (closestPoint.distanceTo(enemy.position) <= 0.6) { damageEnemy(enemy, 5, 0x00ffff); }
                    }
                    let ticks = 0;
                    const fadeInt = setInterval(() => {
                        ticks++; mesh.scale.x *= 0.95; mesh.scale.z *= 0.95; mat.opacity -= 0.02; 
                        if (ticks >= 50) { clearInterval(fadeInt); scene.remove(mesh); }
                    }, 30);
                } else if (lockedEnemies.length > 0) {
                    lockedEnemies.forEach(targetEnemy => {
                        const start = origin.clone(); const end = targetEnemy.position.clone();
                        const distance = start.distanceTo(end); const mid = start.clone().lerp(end, 0.5);
                        const geo = new THREE.CylinderGeometry(0.015, 0.015, distance);
                        geo.rotateX(Math.PI / 2); 
                        const mat = new THREE.MeshBasicMaterial({color: 0x00aaff, transparent: true, opacity: 0.9});
                        const mesh = new THREE.Mesh(geo, mat);
                        mesh.position.copy(mid); mesh.lookAt(end); 
                        scene.add(mesh);
                        damageEnemy(targetEnemy, 1, 0x00aaff);
                        setTimeout(() => scene.remove(mesh), 200);
                    });
                }
            } else if (type === 'triangle') {
                const REPULSE_RADIUS = 3.0 + (powerLevel * 1.5); 
                const PUSH_FORCE = 8.0 * powerLevel; 
                const geo = new THREE.IcosahedronGeometry(0.1, 1);
                const mat = new THREE.MeshBasicMaterial({color: 0xffaa00, wireframe: true, transparent: true, opacity: 0.8});
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(origin);
                scene.add(mesh);
                const expInt = setInterval(() => {
                    mesh.scale.multiplyScalar(1.3 + (powerLevel * 0.1)); mat.opacity -= 0.08;
                    if(mat.opacity <= 0) { clearInterval(expInt); scene.remove(mesh); }
                }, 30);
                enemies.forEach(enemy => {
                    if (enemy.position.distanceTo(origin) < REPULSE_RADIUS) {
                        enemy.userData.state = 'repulsed';
                        const pushDir = new THREE.Vector3().subVectors(enemy.position, origin).normalize();
                        const massFactor = enemy.userData.type === 'brute' ? 0.4 : 1.0;
                        enemy.userData.velocity.copy(pushDir.multiplyScalar(PUSH_FORCE * massFactor)); 
                    }
                });
            } else if (type === 'cross' || type === 'x') {
                const numBeams = 4 * powerLevel;
                const sortedEnemies = [...enemies].sort((a, b) => a.position.distanceTo(origin) - b.position.distanceTo(origin));
                if (sortedEnemies.length > 0) {
                    for (let i = 0; i < numBeams; i++) {
                        const targetEnemy = sortedEnemies[i % sortedEnemies.length]; 
                        const start = origin.clone(); const end = targetEnemy.position.clone();
                        const distance = start.distanceTo(end); const mid = start.clone().lerp(end, 0.5);
                        const beamThickness = 0.015;
                        const geo = new THREE.CylinderGeometry(beamThickness, beamThickness, distance);
                        geo.rotateX(Math.PI / 2); 
                        const mat = new THREE.MeshBasicMaterial({color: 0xaa00ff, transparent: true, opacity: 0.9});
                        const mesh = new THREE.Mesh(geo, mat);
                        mesh.position.copy(mid); mesh.lookAt(end); 
                        scene.add(mesh);
                        damageEnemy(targetEnemy, 1, 0xaa00ff);
                        setTimeout(() => scene.remove(mesh), 200 + (powerLevel * 50));
                    }
                } else {
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
                    const geo = new THREE.CylinderGeometry(0.01 * powerLevel, 0.01 * powerLevel, 10);
                    geo.translate(0, 5, 0); geo.rotateX(-Math.PI / 2); 
                    const mat = new THREE.MeshBasicMaterial({color: 0xaa00ff, transparent: true, opacity: 0.8});
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(origin); mesh.quaternion.copy(camera.quaternion);
                    scene.add(mesh);
                    setTimeout(() => scene.remove(mesh), 300);
                }
            }
        }

        function processGesture() {
            if (drawPoints3D.length < 10) return;
            const points2D = drawPoints3D.map(pt3d => {
                const vec = pt3d.clone().project(camera);
                return new Point((vec.x + 1) * 500, (1 - vec.y) * 500); 
            });
            const result = recognizer.Recognize(points2D);
            const finalSpell = (result.Name === 'x') ? 'cross' : result.Name;
            if (finalSpell !== 'none') {
                const activeHand = hands[activeCastingHand === 'left' ? 0 : 1];
                if (activeHand && activeHand.userData.heldOrbs.length > 0) {
                    const matchingOrbs = activeHand.userData.heldOrbs.filter(o => o.userData.spellType === finalSpell);
                    if (matchingOrbs.length > 0) {
                        const origin = activeHand.joints['wrist'].position.clone();
                        const powerLevel = matchingOrbs.length;
                        matchingOrbs.forEach(orb => {
                            spawnParticleExplosion(orb.position, orb.userData.spellType === 'line' ? 0x00aaff : (orb.userData.spellType === 'triangle' ? 0xffaa00 : 0xaa00ff), 10);
                            scene.remove(orb);
                            const index = orbs.indexOf(orb);
                            if(index > -1) orbs.splice(index, 1);
                        });
                        activeHand.userData.heldOrbs = activeHand.userData.heldOrbs.filter(o => o.userData.spellType !== finalSpell);
                        updateStatsUI();
                        fireSpell(finalSpell, origin, powerLevel);
                    }
                }
            }
        }

        function updateHands(timeDelta, timeSeconds) {
            let activeShakaHand = null;
            hands.forEach(hand => {
                if (!hand || !hand.joints) return;
                const wristSpace = hand.joints['wrist'];
                if (!wristSpace || !wristSpace.position) return; 
                if (isShaka(hand)) activeShakaHand = hand;
                if (hand.userData.gauntletMesh) {
                    hand.userData.gauntletMesh.visible = true;
                    const offset = new THREE.Vector3(0, 0, 0.05).applyQuaternion(wristSpace.quaternion);
                    hand.userData.gauntletMesh.position.copy(wristSpace.position).add(offset);
                    hand.userData.gauntletMesh.quaternion.copy(wristSpace.quaternion);
                }
                Object.keys(hand.joints).forEach(jointName => {
                    const joint = hand.joints[jointName];
                    if (!joint.position) return;
                    if (!hand.userData.jointMeshes[jointName]) {
                        const geo = new THREE.SphereGeometry(jointName.includes('tip') ? 0.012 : 0.008, 8, 8);
                        const mat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.3 });
                        const mesh = new THREE.Mesh(geo, mat);
                        scene.add(mesh);
                        hand.userData.jointMeshes[jointName] = mesh;
                    }
                    const mesh = hand.userData.jointMeshes[jointName];
                    const uniqueJointId = `${hand.userData.handedness}_${jointName}`;
                    const smoothedPos = applyEMA(uniqueJointId, joint.position);
                    mesh.position.copy(smoothedPos); mesh.quaternion.copy(joint.quaternion);
                });
                const isOp = isHandOpen(hand); const isClosed = isHandClosed(hand);
                const pinching = isPinching(hand); const wristPos = hand.joints['wrist'].position;
                if (hand.userData.heldOrbs.length > 0 && isClosed && !isDrawing) {
                    hand.userData.heldOrbs.forEach(orb => {
                        orb.userData.heldBy = null; orb.userData.state = 'idle';
                        orb.userData.baseY = orb.position.y; orb.scale.set(1, 1, 1); 
                    });
                    hand.userData.heldOrbs = []; updateStatsUI();
                }
                if (hand.userData.heldOrbs.length < MAX_HELD_ORBS && isOp && !activeShakaHand) {
                    for (let i = 0; i < orbs.length; i++) {
                        const orb = orbs[i];
                        if (orb.userData.state === 'held') continue; 
                        if (wristPos.distanceTo(orb.position) < CATCH_RADIUS) {
                            orb.userData.heldBy = hand.userData.handedness; orb.userData.state = 'held';
                            hand.userData.heldOrbs.push(orb); updateStatsUI();
                            spawnParticleExplosion(orb.position, 0xffffff, 5);
                            break; 
                        }
                    }
                }
                if (hand.userData.heldOrbs.length > 0) {
                    if (pinching) {
                        if (!isDrawing) {
                            isDrawing = true; currentTrailCount = 0; drawPoints3D = [];
                            activeCastingHand = hand.userData.handedness;
                        }
                        if (currentTrailCount < MAX_TRAIL_POINTS && activeCastingHand === hand.userData.handedness) {
                            const pinchPoint = new THREE.Vector3().addVectors(
                                hand.joints['thumb-tip'].position, hand.joints['index-finger-tip'].position
                            ).multiplyScalar(0.5);
                            drawPoints3D.push(pinchPoint.clone());
                            trailPositions[currentTrailCount * 3] = pinchPoint.x;
                            trailPositions[currentTrailCount * 3 + 1] = pinchPoint.y;
                            trailPositions[currentTrailCount * 3 + 2] = pinchPoint.z;
                            currentTrailCount++;
                            trailGeo.setDrawRange(0, currentTrailCount);
                            trailGeo.attributes.position.needsUpdate = true;
                        }
                    } else if (isDrawing && activeCastingHand === hand.userData.handedness) {
                        isDrawing = false; processGesture(); trailGeo.setDrawRange(0, 0); currentTrailCount = 0;
                    }
                }
            });
            if (activeShakaHand && activeShakaHand.joints['wrist']) {
                hudMesh.visible = true; const wristPos = activeShakaHand.joints['wrist'].position;
                const offset = new THREE.Vector3(0, 0.25, -0.1).applyQuaternion(activeShakaHand.joints['wrist'].quaternion);
                hudMesh.position.copy(wristPos).add(offset); hudMesh.lookAt(camera.position);
                updateHUDCanvas(timeSeconds, activeShakaHand);
            } else { hudMesh.visible = false; }
        }

        function updateEntities(timeDelta, timeSeconds) {
            if (waveState === 'spawning') {
                enemySpawnTimer -= timeDelta;
                if (enemySpawnTimer <= 0 && enemiesSpawnedThisWave < enemiesTotalThisWave) {
                    enemySpawnTimer = Math.max(0.6, baseEnemySpawnRate - (currentWave * 0.4)); 
                    const angle = Math.PI + (Math.random() * Math.PI); 
                    const radius = 6 + (Math.random() * 2); 
                    const yPos = 1.2 + (Math.random() * 0.8 - 0.4); 
                    let type = 'drone';
                    if (currentWave >= 3 && Math.random() < 0.05 + (currentWave * 0.05)) { type = 'brute'; }
                    createEnemy(new THREE.Vector3(Math.cos(angle) * radius, yPos, -0.5 + Math.sin(angle) * radius), type, currentWave);
                    enemiesSpawnedThisWave++;
                }
                if (enemiesSpawnedThisWave >= enemiesTotalThisWave && enemies.length === 0) {
                    waveState = 'intermission'; intermissionTimer = 5.0; 
                    const ann = document.getElementById('wave-announce'); ann.innerText = "WAVE CLEAR"; ann.style.opacity = 1;
                }
            } else if (waveState === 'intermission') {
                intermissionTimer -= timeDelta;
                if (intermissionTimer <= 0) {
                    currentWave++; enemiesTotalThisWave = 10 * currentWave; enemiesSpawnedThisWave = 0;
                    waveState = 'spawning';
                    const ann = document.getElementById('wave-announce'); ann.innerText = `WAVE ${currentWave}`;
                    setTimeout(() => { ann.style.opacity = 0; }, 2000);
                    updateStatsUI();
                }
            }
            orbSpawnTimer -= timeDelta;
            if (orbSpawnTimer <= 0 && orbs.length < 10) { 
                orbSpawnTimer = ORB_SPAWN_RATE;
                const angle = Math.PI + (Math.random() * Math.PI); 
                const radius = 0.3 + Math.random() * 0.2; 
                const yPos = 1.0 + Math.random() * 0.4; 
                createOrb(new THREE.Vector3(
                    camera.position.x + Math.cos(angle) * radius, yPos, camera.position.z + Math.sin(angle) * radius
                ));
            }
            const heartPos = heartStone.position;
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                if (enemy.userData.state === 'homing') {
                    const moveDir = new THREE.Vector3().subVectors(heartPos, enemy.position).normalize();
                    enemy.position.add(moveDir.multiplyScalar(enemy.userData.baseSpeed * timeDelta));
                    enemy.position.y += Math.sin(timeSeconds * 4 + enemy.userData.phase) * 0.003;
                    enemy.rotation.x += 0.02; enemy.rotation.y += 0.03;
                    const hitRadius = enemy.userData.type === 'brute' ? 0.6 : 0.4;
                    if (enemy.position.distanceTo(heartPos) < hitRadius) {
                        damageHeartStone(enemy.userData.type === 'brute' ? 40 : 20); 
                        spawnParticleExplosion(enemy.position, 0xff0000, 15);
                        scene.remove(enemy); enemies.splice(i, 1);
                    }
                } else if (enemy.userData.state === 'repulsed') {
                    enemy.position.add(enemy.userData.velocity.clone().multiplyScalar(timeDelta));
                    enemy.userData.velocity.multiplyScalar(0.92); 
                    if (enemy.userData.velocity.length() < 0.2) enemy.userData.state = 'homing';
                }
            }
            orbs.forEach(orb => {
                if (orb.userData.innerSymbol) {
                    orb.userData.innerSymbol.rotation.y += timeDelta * 2;
                    orb.userData.innerSymbol.rotation.z += timeDelta;
                }
                if (orb.userData.state === 'held') {
                    const handIndex = orb.userData.heldBy === 'left' ? 0 : 1;
                    const hand = hands[handIndex];
                    if (hand && hand.joints && hand.joints['wrist']) {
                        const wristPos = hand.joints['wrist'].position;
                        const heldIndex = hand.userData.heldOrbs.indexOf(orb);
                        const totalHeld = hand.userData.heldOrbs.length;
                        const orbitRadius = 0.08;
                        const angleOffset = (heldIndex / Math.max(1, totalHeld)) * Math.PI * 2 + (timeSeconds * 4);
                        const targetPos = wristPos.clone();
                        const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                        const up = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
                        targetPos.add(right.multiplyScalar(Math.cos(angleOffset) * orbitRadius));
                        targetPos.add(up.multiplyScalar(Math.sin(angleOffset) * orbitRadius));
                        orb.scale.lerp(new THREE.Vector3(0.5, 0.5, 0.5), 0.2); orb.position.lerp(targetPos, 0.3); 
                    }
                } else { orb.position.y = orb.userData.baseY + Math.sin(timeSeconds * 2 + orb.userData.phase) * 0.05; }
            });

            // Update Particle Pool
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.velocity);
                p.userData.life -= 0.02;
                p.material.opacity = p.userData.life;
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        let lastTime = 0;
        function animate(time, frame) {
            const timeSeconds = time * 0.001;
            const timeDelta = Math.min(timeSeconds - lastTime, 0.1); lastTime = timeSeconds;
            heartStone.rotation.y += 0.01; heartStone.rotation.x += 0.005;
            if (renderer.xr.isPresenting) { updateHands(timeDelta, timeSeconds); updateTargeting(); }
            updateEntities(timeDelta, timeSeconds);
            renderer.render(scene, camera);
        }
    </script>
</body>
