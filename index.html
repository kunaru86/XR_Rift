<!DOCTYPE html>
<html>
  <head>
    <title>WebXR: Relativistic Finger Gun Template</title>
    <!-- Stable A-Frame release for WebXR Hand Tracking -->
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    
    <script>
      // 1. PROJECTILE SYSTEM (Pure, clean ballistics)
      AFRAME.registerComponent('projectile-behavior', {
        schema: {
          direction: {type: 'vec3'},
          speed: {type: 'number', default: 15}
        },
        init: function() {
          // Self-destruct timer so we don't leak memory if it flies into the void
          this.lifeTimer = setTimeout(() => {
            if (this.el.parentNode) this.el.parentNode.removeChild(this.el);
          }, 4000); 
        },
        tick: function(time, timeDelta) {
          if (!this.el.parentNode) return; 

          const deltaSec = timeDelta / 1000;
          this.el.object3D.position.x += this.data.direction.x * this.data.speed * deltaSec;
          this.el.object3D.position.y += this.data.direction.y * this.data.speed * deltaSec;
          this.el.object3D.position.z += this.data.direction.z * this.data.speed * deltaSec;
        },
        remove: function() {
          clearTimeout(this.lifeTimer);
        }
      });

      // 2. THE RELATIVISTIC FINGER GUN
      AFRAME.registerComponent('finger-gun', {
        init: function () {
          this.state = 'DISARMED'; // DISARMED, ARMED, COOLDOWN
          
          // The Laser Pointer
          this.laser = document.createElement('a-entity');
          this.laser.setAttribute('geometry', 'primitive: cylinder; radius: 0.002; height: 10');
          this.laser.setAttribute('material', 'color: #ff0000; shader: flat; transparent: true; opacity: 0.6');
          this.laser.setAttribute('rotation', '90 0 0'); 
          this.laser.setAttribute('position', '0 0 -5'); // Pivot at the base
          
          this.laserPivot = document.createElement('a-entity');
          this.laserPivot.appendChild(this.laser);
          this.el.appendChild(this.laserPivot);

          // The Muzzle Flash
          this.muzzleFlash = document.createElement('a-entity');
          this.muzzleFlash.setAttribute('geometry', 'primitive: sphere; radius: 0.04');
          this.muzzleFlash.setAttribute('material', 'color: #ffffff; shader: flat');
          this.muzzleFlash.setAttribute('visible', 'false');
          this.el.appendChild(this.muzzleFlash);

          // Vector cache to prevent garbage collection stutter
          this.vWrist = new THREE.Vector3();
          this.vThumbTip = new THREE.Vector3();
          this.vIndexBase = new THREE.Vector3();
          this.vIndexTip = new THREE.Vector3();
          this.vMidTip = new THREE.Vector3();
          this.vRingTip = new THREE.Vector3();
          this.vPinkyTip = new THREE.Vector3();
        },
        
        tick: function () {
          const tracking = this.el.components['hand-tracking-controls'];
          if (!tracking || !tracking.bones || tracking.bones.length === 0) return;

          const bones = tracking.bones;
          
          // Map WebXR joints
          bones[0].getWorldPosition(this.vWrist);
          bones[4].getWorldPosition(this.vThumbTip);
          bones[5].getWorldPosition(this.vIndexBase);
          bones[9].getWorldPosition(this.vIndexTip);
          bones[14].getWorldPosition(this.vMidTip);
          bones[19].getWorldPosition(this.vRingTip);
          bones[24].getWorldPosition(this.vPinkyTip);

          // AIMING: Index Knuckle to Index Tip. Absolute precision.
          const aimDirection = new THREE.Vector3().subVectors(this.vIndexTip, this.vIndexBase).normalize();

          // Snap laser and flash to the physical index tip
          this.laserPivot.object3D.position.copy(this.vIndexTip);
          const targetPoint = new THREE.Vector3().copy(this.vIndexTip).add(aimDirection);
          this.laserPivot.object3D.lookAt(targetPoint);
          this.muzzleFlash.object3D.position.copy(this.vIndexTip);

          // BIOMETRIC CALIBRATION: Distance from wrist to index knuckle. 
          // This scales the math to fit your specific hand size.
          const baseUnit = this.vWrist.distanceTo(this.vIndexBase);

          // Measure distance of all fingertips to the wrist
          const lenIndex = this.vIndexTip.distanceTo(this.vWrist);
          const lenMid = this.vMidTip.distanceTo(this.vWrist);
          const lenRing = this.vRingTip.distanceTo(this.vWrist);
          const lenPinky = this.vPinkyTip.distanceTo(this.vWrist);

          // POSE DETECTION: Index/Mid extended (> 1.5 units), Ring/Pinky curled (< 1.3 units)
          const isGunPose = (
            lenIndex > baseUnit * 1.5 && 
            lenMid > baseUnit * 1.5 && 
            lenRing < baseUnit * 1.3 && 
            lenPinky < baseUnit * 1.3
          );

          // THUMB DETECTION: How far is the thumb tip from the index base knuckle?
          const thumbDistance = this.vThumbTip.distanceTo(this.vIndexBase);
          
          // Thumb is high (cocked) if distance > 0.8 units. 
          // Thumb is dropped (fired) if distance < 0.65 units.
          const isThumbCocked = thumbDistance > baseUnit * 0.8;
          const isThumbDropped = thumbDistance < baseUnit * 0.65;

          // STATE MACHINE LOGIC
          if (!isGunPose) {
            this.state = 'DISARMED';
            this.laser.setAttribute('material', 'color: #ff0000'); // Red laser
            this.laser.setAttribute('visible', 'true');
            return;
          }

          if (this.state === 'DISARMED' && isThumbCocked) {
            this.state = 'ARMED';
          } else if (this.state === 'COOLDOWN' && isThumbCocked) {
            this.state = 'ARMED'; // Reset the sear
          }

          if (this.state === 'ARMED') {
            this.laser.setAttribute('material', 'color: #00ff00'); // Green laser = ready to fire
            
            if (isThumbDropped) {
              this.fire(aimDirection);
              this.state = 'COOLDOWN';
            }
          } else if (this.state === 'COOLDOWN') {
            this.laser.setAttribute('material', 'color: #ffff00'); // Yellow laser = resetting
          }
        },

        fire: function(aimVector) {
          // Visual feedback
          this.muzzleFlash.setAttribute('visible', 'true');
          setTimeout(() => { this.muzzleFlash.setAttribute('visible', 'false'); }, 50);

          // Spawn Projectile
          const projectile = document.createElement('a-entity');
          projectile.setAttribute('geometry', 'primitive: sphere; radius: 0.05');
          projectile.setAttribute('material', 'color: #00ffff; shader: flat');
          projectile.setAttribute('position', this.vIndexTip); // Shoot from the fingertip
          
          // Stretch it into a blaster bolt
          projectile.object3D.scale.set(1, 1, 4);
          const alignTarget = new THREE.Vector3().copy(this.vIndexTip).add(aimVector);
          projectile.object3D.lookAt(alignTarget);

          projectile.setAttribute('projectile-behavior', `direction: ${aimVector.x} ${aimVector.y} ${aimVector.z}`);
          this.el.sceneEl.appendChild(projectile);
          
          console.log("Telemetry normal. Payload delivered.");
        }
      });
    </script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hand-tracking;" background="color: #111111">
      
      <!-- Spatial reference floor -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#222222" material="wireframe: true"></a-plane>

      <a-entity id="rig" position="0 0 0">
        <a-camera position="0 1.6 0"></a-camera>
        
        <!-- Both hands equipped with the relativistic math -->
        <a-entity id="leftHand" hand-tracking-controls="hand: left;" finger-gun></a-entity>
        <a-entity id="rightHand" hand-tracking-controls="hand: right;" finger-gun></a-entity>
      </a-entity>

    </a-scene>
  </body>
</html>
